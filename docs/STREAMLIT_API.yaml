        label:
          type: str
          description: A short label explaining to the user what this input is for. Supports GitHub-flavored Markdown (Bold, Italics, Strikethroughs, Inline Code, Links, Images). For accessibility reasons, never set an empty label (use label_visibility to hide).
        min_value:
          type: int, float, or None
          description: 'The minimum permitted value. None (default): no minimum for floats, -(1<<53)+1 for integers.'
          default: None
        max_value:
          type: int, float, or None
          description: 'The maximum permitted value. None (default): no maximum for floats, (1<<53)-1 for integers.'
          default: None
        value:
          type: int, float, "min" or None
          description: >-
            The value of this widget when it first renders. If this is
            "min" (default), the initial value is min_value unless
            min_value is None. If min_value is None, the widget
            initializes with a value of 0.0 or 0.
