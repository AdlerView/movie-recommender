    streamlit.page_link:
      signature: st.page_link(page, *, label=None, icon=None, icon_position="left", help=None, disabled=False, use_container_width=None,
        width="content", query_params=None)
      description: >-
        Display a link to another page in a multipage app or to an external page.
        If another page in a multipage app is specified, clicking st.page_link
        stops the current page execution and runs the specified page as if the
        user clicked on it in the sidebar navigation.
        If an external page is specified, clicking st.page_link opens a new
        tab to the specified page. The current script run will continue if not
        complete.
      source: lib/streamlit/elements/widgets/button.py#L965
      parameters:
        page:
          type: str, Path, or StreamlitPage
          description: >-
            The file path (relative to the main script) or a StreamlitPage
            indicating the page to switch to. Alternatively, this can be the
            URL to an external page (must start with "http://" or "https://").
        label:
          type: str
          description: >-
            The label for the page link. Labels are required for external pages.
            The label can optionally contain GitHub-flavored Markdown of the
            following types: Bold, Italics, Strikethroughs, Inline Code, Links,
            and Images. Images display like icons, with a max height equal to
            the font height.
            Unsupported Markdown elements are unwrapped so only their children
            (text contents) render. Common block-level Markdown (headings,
            lists, blockquotes) is automatically escaped and displays as
            literal text in labels.
            See the body parameter of st.markdown for additional,
            supported Markdown directives.
          default: None
          kwarg_only: true
        icon:
          type: str or None
          description: >-
            An optional emoji or icon to display next to the link label. If icon is None (default), the icon is inferred from the StreamlitPage object or no icon is displayed. Options:
            - A single-character emoji (e.g. "🚨" or "🔥"). Emoji short codes are not supported.
            - A Material Symbols icon: ":material/icon_name:" (rounded style, snake case).
            - "spinner": Displays a spinner as an icon.
          default: None
          kwarg_only: true
        icon_position:
          type: '"left" or "right"'
          description: The position of the icon relative to the link label. Defaults to "left".
          default: '"left"'
          kwarg_only: true
        help:
          type: str or None
          description: >-
            A tooltip that gets displayed when the link is hovered over. If
            this is None (default), no tooltip is displayed.
            The tooltip can optionally contain GitHub-flavored Markdown,
            including the Markdown directives described in the body
            parameter of st.markdown.
          default: None
          kwarg_only: true
        disabled:
          type: bool
          description: Disables the page link if set to True. Default is False.
          default: 'False'
          kwarg_only: true
        use_container_width:
          type: bool
          description: Whether to expand the link's width to fill its parent container. Default is True in sidebar, False in main app.
          default: None
          kwarg_only: true
        width:
          type: '"content", "stretch", or int'
          description: >-
            The width of the page-link button. This can be one of the following:
            "content" (default): The width of the button matches the
            width of its content, but doesn't exceed the width of the parent
            container.
            "stretch": The width of the button matches the width of the
            parent container.
            An integer specifying the width in pixels: The button has a
            fixed width. If the specified width is greater than the width of
            the parent container, the width of the button matches the width
            of the parent container.
          default: '"content"'
          kwarg_only: true
        query_params:
          type: dict, list of tuples, or None
          description: >-
            Query parameters to apply when navigating to the target page.
            This can be a dictionary or an iterable of key-value tuples. Values can
            be strings or iterables of strings (for repeated keys). When this is
            None (default), all non-embed query parameters are cleared during
            navigation.
          default: None
          kwarg_only: true
