          default: '"above"'
    streamlit.form:
      signature: st.form(key, clear_on_submit=False, *, enter_to_submit=True, border=True, width="stretch", height="content")
      description: >-
        Create a form that batches elements together with a "Submit" button.
        A form is a container that visually groups other elements and
        widgets together, and contains a Submit button. When the form's
        Submit button is pressed, all widget values inside the form will be
        sent to Streamlit in a batch.
        To add elements to a form object, you can use with notation
        (preferred) or just call methods directly on the form. See
        examples below.
        Forms have a few constraints:
        Every form must contain a st.form_submit_button.
        st.button and st.download_button cannot be added to a form.
        Forms can appear anywhere in your app (sidebar, columns, etc),
        but they cannot be embedded inside other forms.
        Within a form, the only widget that can have a callback function is
        st.form_submit_button.
      source: lib/streamlit/elements/form.py#L75
      parameters:
        key:
          type: str
          description: >-
            A string that identifies the form. Each form must have its own
            key. (This key is not displayed to the user in the interface.)
            Additionally, if key is provided, it will be used as a
            CSS class name prefixed with st-key-.
        clear_on_submit:
          type: bool
          description: >-
            If True, all widgets inside the form will be reset to their default
            values after the user presses the Submit button. Defaults to False.
            (Note that Custom Components are unaffected by this flag, and
            will not be reset to their defaults on form submission.)
          default: 'False'
        enter_to_submit:
          type: bool
          description: >-
            Whether to submit the form when a user presses Enter while
            interacting with a widget inside the form.
            If this is True (default), pressing Enter while interacting
            with a form widget is equivalent to clicking the first
            st.form_submit_button in the form.
            If this is False, the user must click an
            st.form_submit_button to submit the form.
            If the first st.form_submit_button in the form is disabled,
            the form will override submission behavior with
            enter_to_submit=False.
          default: 'True'
          kwarg_only: true
        border:
          type: bool
          description: >-
            Whether to show a border around the form. Defaults to True.
            Note
            Not showing a border can be confusing to viewers since interacting with a
            widget in the form will do nothing. You should only remove the border if
            there's another border (e.g. because of an expander) or the form is small
            (e.g. just a text input and a submit button).
          default: 'True'
          kwarg_only: true
        width:
          type: '"stretch", "content", or int'
          description: >-
            The width of the form container. This can be one of the following:
            "stretch" (default): The width of the container matches the
            width of the parent container.
            "content": The width of the container matches the width of its
            content, but doesn't exceed the width of the parent container.
            An integer specifying the width in pixels: The container has a
            fixed width. If the specified width is greater than the width of
            the parent container, the width of the container matches the width
            of the parent container.
          default: '"stretch"'
          kwarg_only: true
        height:
          type: '"content", "stretch", or int'
          description: >-
            The height of the form container. This can be one of the following:
            "content" (default): The height of the container matches the
            height of its content.
            "stretch": The height of the container matches the height of
            its content or the height of the parent container, whichever is
            larger. If the container is not in a parent container, the height
            of the container matches the height of its content.
            An integer specifying the height in pixels: The container has a
            fixed height. If the content is larger than the specified
            height, scrolling is enabled.
            Note
            Use scrolling containers sparingly. If you use scrolling
            containers, avoid heights that exceed 500 pixels. Otherwise,
            the scroll surface of the container might cover the majority of
            the screen on mobile devices, which makes it hard to scroll the
            rest of the app.
          default: '"content"'
          kwarg_only: true
    streamlit.fragment:
      signature: st.fragment(func=None, *, run_every=None)
      description: >-
        Decorator to turn a function into a fragment which can rerun independently    of the full app.
        When a user interacts with an input widget created inside a fragment,
        Streamlit only reruns the fragment instead of the full app. If
        run_every is set, Streamlit will also rerun the fragment at the
        specified interval while the session is active, even if the user is not
        interacting with your app.
        To trigger an app rerun from inside a fragment, call st.rerun()
        directly. To trigger a fragment rerun from within itself, call
        st.rerun(scope="fragment"). Any values from the fragment that need to
        be accessed from the wider app should generally be stored in Session State.
        When Streamlit element commands are called directly in a fragment, the
        elements are cleared and redrawn on each fragment rerun, just like all
        elements are redrawn on each app rerun. The rest of the app is persisted
        during a fragment rerun. When a fragment renders elements into externally
        created containers, the elements will not be cleared with each fragment
        rerun. Instead, elements will accumulate in those containers with each
        fragment rerun, until the next app rerun.
        Calling st.sidebar in a fragment is not supported. To write elements to
        the sidebar with a fragment, call your fragment function inside a
        with st.sidebar context manager.
        Fragment code can interact with Session State, imported modules, and
        other Streamlit elements created outside the fragment. Note that these
        interactions are additive across multiple fragment reruns. You are
        responsible for handling any side effects of that behavior.
        Warning
        Fragments can only contain widgets in their main body. Fragments
        can't render widgets to externally created containers.
      source: lib/streamlit/runtime/fragment.py#L297
      parameters:
        func:
          type: callable
          description: The function to turn into a fragment.
          default: None
        run_every:
          type: int, float, timedelta, str, or None
          description: >-
            The time interval between automatic fragment reruns. This can be one of
            the following:
            None (default).
            An int or float specifying the interval in seconds.
            A string specifying the time in a format supported by Pandas'
            Timedelta constructor,
            e.g. "1d", "1.5 days", or "1h23s".
            A timedelta object from Python's built-in datetime library,
            e.g. timedelta(days=1).
            If run_every is None, the fragment will only rerun from
            user-triggered events.
          default: None
          kwarg_only: true
    streamlit.rerun:
      signature: st.rerun(*, scope="app")
      description: >-
        Rerun the script immediately.
        When st.rerun() is called, Streamlit halts the current script run and
        executes no further statements. Streamlit immediately queues the script to
        rerun.
        When using st.rerun in a fragment, you can scope the rerun to the
        fragment. However, if a fragment is running as part of a full-app rerun,
        a fragment-scoped rerun is not allowed.
      source: lib/streamlit/commands/execution_control.py#L132
      parameters:
        scope:
          type: '"app" or "fragment"'
          description: >-
            Specifies what part of the app should rerun. If scope is "app"
            (default), the full app reruns. If scope is "fragment",
            Streamlit only reruns the fragment from which this command is called.
            Setting scope="fragment" is only valid inside a fragment during a
            fragment rerun. If st.rerun(scope="fragment") is called during a
            full-app rerun or outside of a fragment, Streamlit will raise a
            StreamlitAPIException.
          default: '"app"'
          kwarg_only: true
    streamlit.stop:
      signature: st.stop()
      description: >-
        Stops execution immediately.
        Streamlit will not run any statements after st.stop().
        We recommend rendering a message to explain why the script has stopped.
      source: lib/streamlit/commands/execution_control.py#L39
  caching:
    streamlit.cache:
      signature: st.cache(func=None, persist=False, allow_output_mutation=False, show_spinner=True, suppress_st_warning=False,
        hash_funcs=None, max_entries=None, ttl=None)
      description: >-
        Legacy caching decorator (deprecated).
        Legacy caching with st.cache has been removed from Streamlit. This is
        now an alias for st.cache_data and st.cache_resource.
      source: lib/streamlit/runtime/caching/legacy_cache_api.py#L34
      parameters:
        func:
          type: callable
          description: The function to cache. Streamlit hashes the function's source code.
          default: None
        persist:
          type: bool
          description: Whether to persist the cache on disk.
          default: 'False'
        allow_output_mutation:
          type: bool
          description: Whether to use st.cache_data or st.cache_resource. False (default) uses cache_data. True uses cache_resource.
          default: 'False'
        show_spinner:
          type: bool
          description: Enable the spinner. True (default) shows spinner on cache miss.
          default: 'True'
        suppress_st_warning:
          type: bool
          description: This is not used.
          default: 'False'
        hash_funcs:
          type: dict or None
          description: >-
            Mapping of types or fully qualified names to hash functions. This is used to
            override the behavior of the hasher inside Streamlit's caching mechanism: when
            the hasher encounters an object, it will first check to see if its type matches
            a key in this dict and, if so, will use the provided function to generate a hash
            for it. See below for an example of how this can be used.
          default: None
        max_entries:
          type: int or None
          description: Max cache entries. None (default) for unbounded. Oldest entry evicted when full.
          default: None
        ttl:
          type: float or None
          description: Max seconds to keep a cache entry. None (default) means no expiry.
          default: None
    streamlit.cache_data:
      signature: st.cache_data(func=None, *, ttl, max_entries, show_spinner, show_time=False, persist, hash_funcs=None, scope="global")
      description: >-
        Decorator to cache functions that return data (e.g. dataframe transforms, database queries, ML inference).
        Cached objects can be global or session-scoped. Global cached data is
        available across all users, sessions, and reruns. Session-scoped cached
        data is only available in the current session and removed when the
        session disconnects.
        Cached objects are stored in "pickled" form, which means that the return
        value of a cached function must be pickleable. Each caller of the cached
        function gets its own copy of the cached data.
        You can clear a function's cache with func.clear() or clear the entire
        cache with st.cache_data.clear().
        A function's arguments must be hashable to cache it. Streamlit makes a
        best effort to hash a variety of objects, but the fallback hashing method
        requires that the argument be pickleable, also. If you have an unhashable
        argument (like a database connection) or an argument you want to exclude
        from caching, use an underscore prefix in the argument name. In this case,
        Streamlit will return a cached value when all other arguments match a
        previous function call. Alternatively, you can declare custom hashing
        functions with hash_funcs.
        Objects cached by st.cache_data are returned as copies. To cache a
        shared resource or something you want to mutate in place, use
        st.cache_resource instead. To learn more about caching, see
        Caching overview.
        Note
        Caching async functions is not supported. To upvote this feature,
        see GitHub issue #8308.
      source: lib/streamlit/runtime/caching/cache_data_api.py#L454
      parameters:
        func:
          type: callable
          description: The function to cache. Streamlit hashes the function's source code.
          default: None
        ttl:
          type: float, timedelta, str, or None
          description: >-
            The maximum time to keep an entry in the cache. Can be one of:
            None if cache entries should never expire (default).
            A number specifying the time in seconds.
            A string specifying the time in a format supported by Pandas's
            Timedelta constructor,
            e.g. "1d", "1.5 days", or "1h23s".
            A timedelta object from Python's built-in datetime library,
            e.g. timedelta(days=1).
            Note that ttl will be ignored if persist="disk" or persist=True.
          kwarg_only: true
        max_entries:
          type: int or None
          description: Max cache entries. None (default) for unbounded. When full, oldest entry is evicted.
          default: None
          kwarg_only: true
        show_spinner:
          type: bool or str
          description: 'Enable the spinner. True (default): show spinner on cache miss. String: custom spinner text. False: no spinner.'
          default: 'True'
          kwarg_only: true
        show_time:
          type: bool
          description: Whether to show elapsed time next to the spinner text. False (default) hides time. True shows elapsed time with 0.1s precision (format not configurable).
          default: 'False'
          kwarg_only: true
        persist:
          type: '"disk", bool, or None'
          description: 'Persist cached data to disk. "disk" or True persists locally. None or False (default) disables persistence.'
          default: None
          kwarg_only: true
        hash_funcs:
          type: dict or None
          description: >-
            Mapping of types or fully qualified names to hash functions.
            This is used to override the behavior of the hasher inside Streamlit's
            caching mechanism: when the hasher encounters an object, it will first
            check to see if its type matches a key in this dict and, if so, will use
            the provided function to generate a hash for it. See below for an example
            of how this can be used.
          default: None
          kwarg_only: true
        scope:
          type: '"global" or "session"'
          description: >-
            The scope for the data cache. If this is "global" (default),
            the data is cached globally. If this is "session", the data is
            removed from the cache when the session disconnects.
            Because a session-scoped cache is cleared when a session disconnects,
            an unstable network connection can cause the cache to populate
            multiple times in a single session. If this is a problem, you might
            consider adjusting the server.websocketPingInterval
            configuration option.
          default: '"global"'
          kwarg_only: true
    streamlit.cache_resource:
      signature: st.cache_resource(func, *, ttl, max_entries, show_spinner, show_time=False, validate, hash_funcs=None, on_release=None,
        scope="global")
      description: >-
        Decorator to cache functions that return resource objects (e.g. database connections, ML models).
        Cached objects can be global or session-scoped. Global resources are
        shared across all users, sessions, and reruns. Session-scoped resources are
        scoped to the current session and are removed when the session disconnects.
        Global resources must be thread-safe. If thread safety is an issue,
        consider using a session-scoped cache or storing the resource in
        st.session_state instead.
        You can clear a function's cache with func.clear() or clear the entire
        cache with st.cache_resource.clear().
        A function's arguments must be hashable to cache it. Streamlit makes a
        best effort to hash a variety of objects, but the fallback hashing method
        requires that the argument be pickleable, also. If you have an unhashable
        argument (like a database connection) or an argument you want to exclude
        from caching, use an underscore prefix in the argument name. In this case,
        Streamlit will return a cached value when all other arguments match a
        previous function call. Alternatively, you can declare custom hashing
        functions with hash_funcs.
        Objects cached by st.cache_resource act like singletons and can
        mutate. To cache data and return copies, use st.cache_data instead.
        To learn more about caching, see Caching overview.
        Warning
        Async objects are not officially supported in Streamlit. Caching
        async objects or objects that reference async objects may have
        unintended consequences. For example, Streamlit may close event
        loops in its normal operation and make the cached object raise an
        Event loop closed error.
        To upvote official asyncio support, see GitHub issue #8488. To upvote
        support for caching async functions, see GitHub issue #8308.
      source: lib/streamlit/runtime/caching/cache_resource_api.py#L352
      parameters:
        func:
          type: callable
          description: The function that creates the cached resource. Streamlit hashes the function's source code.
        ttl:
          type: float, timedelta, str, or None
          description: >-
            The maximum age of a returned entry from the cache. This can be one
            of the following values:
            None if cache entries should never expire (default).
            A number specifying the time in seconds.
            A string specifying the time in a format supported by Pandas's
            Timedelta constructor,
            e.g. "1d", "1.5 days", or "1h23s". Note that number strings
            without units are treated by Pandas as nanoseconds.
            A timedelta object from Python's built-in datetime library,
            e.g. timedelta(days=1).
            Changes to this value will trigger a new cache to be created.
          kwarg_only: true
        max_entries:
          type: int or None
          description: Max cache entries. None (default) for unbounded. When full, oldest entry is evicted.
            Changes to this value will trigger a new cache to be created.
          default: None
          kwarg_only: true
        show_spinner:
          type: bool or str
          description: 'Enable the spinner. True (default): show spinner on cache miss. String: custom spinner text. False: no spinner.'
          default: 'True'
          kwarg_only: true
        show_time:
          type: bool
          description: Whether to show elapsed time next to the spinner text. False (default) hides time. True shows elapsed time with 0.1s precision (format not configurable).
          default: 'False'
          kwarg_only: true
        validate:
          type: callable or None
          description: >-
            An optional validation function for cached resources. validate is called
            each time the cached value is accessed. It receives the cached value as
            its only parameter and it must return a boolean. If validate returns
            False, the current cached value is discarded, and the decorated function
            is called to compute a new value. This is useful e.g. to check the
            health of database connections.
          kwarg_only: true
        hash_funcs:
          type: dict or None
          description: >-
            Mapping of types or fully qualified names to hash functions.
            This is used to override the behavior of the hasher inside Streamlit's
            caching mechanism: when the hasher encounters an object, it will first
            check to see if its type matches a key in this dict and, if so, will use
            the provided function to generate a hash for it. See below for an example
            of how this can be used.
          default: None
          kwarg_only: true
        on_release:
          type: callable or None
          description: >-
            A function to call when an entry is removed from the cache.
            The removed item will be provided to the function as an argument.
            This is only useful for caches that remove entries normally.
            Most commonly, this is used session-scoped caches to release
            per-session resources. This can also be used with max_entries
            or ttl settings.
            TTL expiration only happens when expired resources are accessed.
            Therefore, don't rely on TTL expiration to guarantee timely cleanup.
            Also, expiration can happen on any script run. Ensure that
            on_release functions are thread-safe and don't rely on session
            state.
            The on_release function isn't guaranteed to be called when an
            app is shut down.
          default: None
          kwarg_only: true
        scope:
          type: '"global" or "session"'
          description: >-
            The scope for the resource cache. If this is "global" (default),
            the resource is cached globally. If this is "session", the
            resource is removed from the cache when the session disconnects.
            Because a session-scoped cache is cleared when a session disconnects,
            an unstable network connection can cause the cache to populate
            multiple times in a single session. If this is a problem, you might
            consider adjusting the server.websocketPingInterval
            configuration option.
          default: '"global"'
          kwarg_only: true
    streamlit.cache_data.clear:
      signature: st.cache_data.clear()
      description: Clear all in-memory and on-disk data caches.
      source: lib/streamlit/runtime/caching/cache_data_api.py#L698
    streamlit.cache_resource.clear:
      signature: st.cache_resource.clear()
      description: Clear all cache_resource caches.
      source: lib/streamlit/runtime/caching/cache_resource_api.py#L631
    streamlit.context:
      signature: st.context()
      description: >-
        An interface to access user session context.
        st.context provides a read-only interface to access headers and cookies
        for the current user session.
        Each property (st.context.headers and st.context.cookies) returns
        a dictionary of named values.
      source: lib/streamlit/runtime/context.py#L145
  navigation:
    streamlit.Page:
      signature: st.Page(page, *, title=None, icon=None, url_path=None, default=False, visibility="visible")
      description: >-
        Configure a page for st.navigation in a multipage app.
        Call st.Page to initialize a StreamlitPage object, and pass it to
        st.navigation to declare a page in your app.
        When a user navigates to a page, st.navigation returns the selected
        StreamlitPage object. Call .run() on the returned StreamlitPage
        object to execute the page. You can only run the page returned by
        st.navigation, and you can only run it once per app rerun.
        A page can be defined by a Python file or Callable.
      source: lib/streamlit/navigation/page.py#L32
      parameters:
        page:
          type: str, Path, or callable
          description: >-
            The page source as a Callable or path to a Python file. If the page
            source is defined by a Python file, the path can be a string or
            pathlib.Path object. Paths can be absolute or relative to the
            entrypoint file. If the page source is defined by a Callable, the
            Callable can't accept arguments.
        title:
          type: str or None
          description: >-
            The title of the page. If this is None (default), the page title
            (in the browser tab) and label (in the navigation menu) will be
            inferred from the filename or callable name in page. For more
            information, see Overview of multipage apps.
            The title supports GitHub-flavored Markdown of the following types:
            Bold, Italics, Strikethrough, Inline Code, and Images. Images display
            like icons, with a max height equal to the font height.
            Unsupported Markdown elements are unwrapped so only their children
            (text contents) render. Common block-level Markdown (headings,
            lists, blockquotes) is automatically escaped and displays as
            literal text in labels.
            See the body parameter of st.markdown for additional, supported
            Markdown directives.
          default: None
          kwarg_only: true
        icon:
          type: str or None
          description: >-
            An optional emoji or icon to display next to the page title and label.
            If icon is None (default), no icon is displayed next to the
            page label in the navigation menu, and a Streamlit icon is displayed
            next to the title (in the browser tab). If icon is a string, the
            following options are valid:
            A single-character emoji. For example, you can set icon="🚨"
            or icon="🔥". Emoji short codes are not supported.
            An icon from the Material Symbols library (rounded style) in the
            format ":material/icon_name:" where "icon_name" is the name
            of the icon in snake case.
            For example, icon=":material/thumb_up:" will display the
            Thumb Up icon. Find additional icons in the Material Symbols
            font library.
            "spinner": Displays a spinner as an icon. In this case, the
            spinner only displays next to the page label in the navigation menu.
            The spinner isn't used as the page favicon next to the title in the
            browser tab. The favicon is the default Streamlit icon unless
            otherwise specified with the page_icon parameter of
            st.set_page_config.
          default: None
          kwarg_only: true
        url_path:
          type: str or None
          description: >-
            The page's URL pathname, which is the path relative to the app's root
            URL. If this is None (default), the URL pathname will be inferred
            from the filename or callable name in page. For more information,
            see Overview of multipage apps.
            The default page will have a pathname of "", indicating the root
            URL of the app. If you set default=True, url_path is ignored.
            url_path can't include forward slashes; paths can't include
            subdirectories.
          default: None
          kwarg_only: true
        default:
          type: bool
          description: >-
            Whether this page is the default page to be shown when the app is
            loaded. If default is False (default), the page will have a
            nonempty URL pathname. However, if no default page is passed to
            st.navigation and this is the first page, this page will become the
            default page. If default is True, then the page will have
            an empty pathname and url_path will be ignored.
          default: 'False'
          kwarg_only: true
        visibility:
          type: '"visible" or "hidden"'
          description: '"visible" (default): page appears in nav menu. "hidden": excluded from nav but accessible via URL, st.page_link, or st.switch_page. Note: URL navigation starts a new session.'
          default: '"visible"'
          kwarg_only: true
      returns:
      - type: StreamlitPage
        description: The page object associated to the given script.
    streamlit.navigation:
      signature: st.navigation(pages, *, position="sidebar", expanded=False)
      description: >-
        Configure the available pages in a multipage app.
        Call st.navigation in your entrypoint file to define the available
        pages for your app. st.navigation returns the current page, which can
        be executed using .run() method.
        When using st.navigation, your entrypoint file (the file passed to
        streamlit run) acts like a router or frame of common elements around
        each of your pages. Streamlit executes the entrypoint file with every app
        rerun. To execute the current page, you must call the .run() method on
        the StreamlitPage object returned by st.navigation.
        The set of available pages can be updated with each rerun for dynamic
        navigation. By default, st.navigation displays the available pages in
        the sidebar if there is more than one page. This behavior can be changed
        using the position keyword argument.
        As soon as any session of your app executes the st.navigation command,
        your app will ignore the pages/ directory (across all sessions).
      source: lib/streamlit/commands/navigation.py#L80
      parameters:
        pages:
          type: Sequence[page-like], Mapping[str, Sequence[page-like]]
          description: >-
            The available pages for the app.
            To create a navigation menu with no sections or page groupings,
            pages must be a list of page-like objects. Page-like objects are
            anything that can be passed to st.Page or a StreamlitPage
            object returned by st.Page.
            To create labeled sections or page groupings within the navigation
            menu, pages must be a dictionary. Each key is the label of a
            section and each value is the list of page-like objects for
            that section. If you use position="top", each grouping will be a
            collapsible item in the navigation menu. For top navigation, if you use
            an empty string as a section header, the pages in that section will be
            displayed at the beginning of the menu before the collapsible sections.
            Section labels support GitHub-flavored Markdown as described in the
            title parameter of st.Page.
            When you use a string or path as a page-like object, they are
            internally passed to st.Page and converted to StreamlitPage
            objects. In this case, the page will have the default title, icon, and
            path inferred from its path or filename. To customize these attributes
            for your page, initialize your page with st.Page.
        position:
          type: '"sidebar", "top", or "hidden"'
          description: >-
            The position of the navigation menu. If this is "sidebar"
            (default), the navigation widget appears at the top of the sidebar. If
            this is "top", the navigation appears in the top header of the app.
            If this is "hidden", the navigation widget is not displayed.
            If there is only one page in pages, the navigation will be hidden
            for any value of position.
          default: '"sidebar"'
          kwarg_only: true
        expanded:
          type: bool
          description: >-
