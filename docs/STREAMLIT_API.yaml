    streamlit.chat_input:
      signature: st.chat_input(placeholder="Your message", *, key=None, max_chars=None, max_upload_size=None, accept_file=False,
        file_type=None, accept_audio=False, audio_sample_rate=16000, disabled=False, on_submit=None, args=None, kwargs=None,
        width="stretch")
      description: Display a chat input widget.
      source: lib/streamlit/elements/widgets/chat.py#L599
      parameters:
        placeholder:
          type: str
          description: Placeholder text shown when the chat input is empty. Defaults to "Your message". For accessibility, don't use an empty string.
          default: '"Your message"'
        key:
          type: str, int, or None
          description: Unique key for the widget. Stabilizes identity across reruns. Note: changing accept_file, file_type, max_chars, or max_upload_size resets the widget even with a key. Read/update via st.session_state[key]. Also used as CSS class st-key-.
          default: None
          kwarg_only: true
        max_chars:
          type: int or None
          description: Maximum number of characters allowed. If None (default), no maximum.
          default: None
          kwarg_only: true
        max_upload_size:
          type: int or None
          description: Max upload file size in MB. None (default) uses server.maxUploadSize from config.toml. A positive integer overrides that config.
          default: None
          kwarg_only: true
        accept_file:
          type: bool, "multiple", or "directory"
          description: >-
            Whether the chat input should accept files. This can be one of the
            following values:
            False (default): No files are accepted and the user can only
            submit a message.
            True: The user can add a single file to their submission.
            "multiple": The user can add multiple files to their
            submission.
            "directory": The user can add multiple files to their
            submission by selecting a directory. If file_type is set,
            only files matching those type(s) will be uploaded.
            By default, uploaded files are limited to 200 MB each. You can
            configure this using the server.maxUploadSize config option.
            For more information on how to set config options, see
            config.toml.
          default: 'False'
          kwarg_only: true
        file_type:
          type: str, Sequence[str], or None
          description: >-
            The allowed file extension(s) for uploaded files. This can be one
            of the following types:
            None (default): All file extensions are allowed.
            A string: A single file extension is allowed. For example, to
            only accept CSV files, use "csv".
            A sequence of strings: Multiple file extensions are allowed. For
            example, to only accept JPG/JPEG and PNG files, use
            ["jpg", "jpeg", "png"].
            Note
            This is a best-effort check, but doesn't provide a
            security guarantee against users uploading files of other types
            or type extensions. The correct handling of uploaded files is
            part of the app developer's responsibility.
          default: None
          kwarg_only: true
        accept_audio:
          type: bool
          description: Whether to show an audio recording button. False by default. If True, users can record and submit audio (available as UploadedFile, MIME type audio/wav).
          default: 'False'
          kwarg_only: true
        audio_sample_rate:
          type: int or None
          description: Target sample rate for audio recording in Hz (when accept_audio=True). Defaults to 16000. Supported values: 8000, 11025, 16000, 22050, 24000, 32000, 44100, 48000, or None (browser default).
          default: '16000'
          kwarg_only: true
        disabled:
          type: bool
          description: Whether the chat input should be disabled. Defaults to False.
          default: 'False'
          kwarg_only: true
        on_submit:
          type: callable
          description: An optional callback invoked when the chat input's value is submitted.
          default: None
          kwarg_only: true
        args:
          type: list or tuple
          description: An optional list or tuple of args to pass to the callback.
          default: None
          kwarg_only: true
        kwargs:
          type: dict
          description: An optional dict of kwargs to pass to the callback.
          default: None
          kwarg_only: true
        width:
          type: '"stretch" or int'
          description: '"stretch" (default): matches parent width. Integer: fixed width in pixels, capped at parent.'
          default: '"stretch"'
          kwarg_only: true
      returns:
      - type: None, str, or dict-like
        description: >-
          The user's submission. This is one of the following types:
          None: If the user didn't submit a message, file, or audio
          recording in the last rerun, the widget returns None.
          A string: When the widget isn't configured to accept files or
          audio recordings, and the user submitted a message in the last
          rerun, the widget returns the user's message as a string.
          A dict-like object: When the widget is configured to accept files
          or audio recordings, and the user submitted any content in the
          last rerun, the widget returns a dict-like object.
          The object always includes the text attribute, and
          optionally includes files and/or audio attributes depending
          on the accept_file and accept_audio parameters.
          When the widget is configured to accept files or audio recordings,
          and the user submitted content in the last rerun, you can access
          the user's submission with key or attribute notation from the
          dict-like object. This is shown in Example 3 below.
          The text attribute holds a string that is the user's message.
          This is an empty string if the user only submitted one or more
          files or audio recordings.
          The files attribute is only present when accept_file
          isn't False. When present, it holds a list of
          UploadedFile objects. The list is empty if the user only
          submitted a message or audio recording. Unlike
          st.file_uploader, this attribute always returns a list, even
          when the widget is configured to accept only one file at a time.
          The audio attribute is only present when accept_audio is
          True. When present, it holds an UploadedFile object if
          audio was recorded or None if no audio was recorded.
          The UploadedFile class is a subclass of BytesIO and
          therefore is "file-like". This means you can pass an instance of it
          anywhere a file is expected.
    streamlit.checkbox:
      signature: st.checkbox(label, value=False, key=None, help=None, on_change=None, args=None, kwargs=None, *, disabled=False,
        label_visibility="visible", width="content", bind=None)
      description: Display a checkbox widget.
      source: lib/streamlit/elements/widgets/checkbox.py#L65
      parameters:
        label:
          type: str
          description: >-
            A short label explaining to the user what this checkbox is for.
            The label can optionally contain GitHub-flavored Markdown of the
            following types: Bold, Italics, Strikethroughs, Inline Code, Links,
            and Images. Images display like icons, with a max height equal to
            the font height.
            Unsupported Markdown elements are unwrapped so only their children
            (text contents) render. Common block-level Markdown (headings,
            lists, blockquotes) is automatically escaped and displays as
            literal text in labels.
            See the body parameter of st.markdown for additional,
            supported Markdown directives.
            For accessibility reasons, you should never set an empty label, but
            you can hide it with label_visibility if needed. In the future,
            we may disallow empty labels by raising an exception.
        value:
          type: bool
          description: Preselect the checkbox when it first renders. Cast to bool internally.
          default: 'False'
        key:
          type: str, int, or None
          description: An optional string or integer to use as the unique key for the widget. If None (default), a key is generated based on other parameters. Assigning a key stabilizes identity and preserves state across reruns. Read or update value via st.session_state[key]. Also used as CSS class name prefixed with st-key-.
          default: None
        help:
          type: str or None
          description: A tooltip displayed next to the widget label (only when label_visibility="visible"). If None (default), no tooltip. Supports GitHub-flavored Markdown.
          default: None
        on_change:
          type: callable
          description: An optional callback invoked when this checkbox's value changes.
          default: None
        args:
          type: list or tuple
          description: An optional list or tuple of args to pass to the callback.
          default: None
        kwargs:
          type: dict
          description: An optional dict of kwargs to pass to the callback.
          default: None
        disabled:
          type: bool
          description: Disables the checkbox if set to True. Default is False.
          default: 'False'
          kwarg_only: true
        label_visibility:
          type: '"visible", "hidden", or "collapsed"'
          description: 'The visibility of the label. Default is "visible". "hidden": empty spacer instead of label. "collapsed": no label or spacer.'
          default: '"visible"'
          kwarg_only: true
        width:
          type: '"content", "stretch", or int'
          description: '"content" (default): matches content width, capped at parent. "stretch": matches parent width. Integer: fixed width in pixels, capped at parent.'
          default: '"content"'
          kwarg_only: true
        bind:
          type: '"query-params" or None'
          description: 'Syncs widget value with URL query parameter. None (default): not synced. "query-params": changes update URL, widget can be initialized from URL. Requires key (used as query param name). Default values are removed from URL. Bound params can only be changed via st.session_state.'
          default: None
          kwarg_only: true
      returns:
      - type: bool
        description: Whether or not the checkbox is checked.
