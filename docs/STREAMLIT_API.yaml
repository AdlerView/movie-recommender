    streamlit.logo:
      signature: st.logo(image, *, size="medium", link=None, icon_image=None)
      description: >-
        Renders a logo in the upper-left corner of your app and its sidebar.
        If st.logo is called multiple times within a page, Streamlit will
        render the image passed in the last call. For the most consistent results,
        call st.logo early in your page script and choose an image that works
        well in both light and dark mode. Avoid empty margins around your image.
        If your logo does not work well for both light and dark mode, consider
        setting the theme and hiding the settings menu from users with the
        configuration option
        client.toolbarMode="minimal".
        If a user clicks the logo, they are redirected to your app's home page.
      source: lib/streamlit/commands/logo.py#L86
      parameters:
        image:
          type: Anything supported by st.image (except list) or str
          description: >-
            The image to display in the upper-left corner of your app and its sidebar. If icon_image is also provided, Streamlit only displays image in the sidebar. Supports any type from st.image (except list), plus:
            - A single-character emoji (e.g. "🏠" or "🚀"). Emoji short codes are not supported.
            - A Material Symbols icon: ":material/icon_name:" (rounded style, snake case).
            Streamlit scales the image to a max height set by size and a max width to fit within the sidebar.
        size:
          type: '"small", "medium", or "large"'
