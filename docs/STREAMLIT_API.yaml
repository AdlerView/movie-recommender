api:
  widgets:
    streamlit.audio_input:
      signature: st.audio_input(label, *, sample_rate=16000, key=None, help=None, on_change=None, args=None, kwargs=None,
        disabled=False, label_visibility="visible", width="stretch")
      description: Display a widget that returns an audio recording from the user's microphone.
      source: lib/streamlit/elements/widgets/audio_input.py#L90
      parameters:
        label:
          type: str
          description: A short label explaining to the user what this widget is used for. The label can optionally contain GitHub-flavored Markdown of the following types: Bold, Italics, Strikethroughs, Inline Code, Links, and Images. Images display like icons, with a max height equal to the font height. Unsupported Markdown elements are unwrapped so only their children (text contents) render. For accessibility reasons, you should never set an empty label, but you can hide it with label_visibility if needed.
        sample_rate:
          type: int or None
          description: The target sample rate for the audio recording in Hz. Defaults to 16000, which is optimal for speech recognition. Supported values: 8000, 11025, 16000, 22050, 24000, 32000, 44100, 48000, or None (browser default, typically 44100 or 48000 Hz).
          default: '16000'
          kwarg_only: true
        key:
          type: str, int, or None
          description: An optional string or integer to use as the unique key for the widget. If None (default), a key is generated based on other parameters. Assigning a key stabilizes the widget's identity and preserves its state across reruns even when other parameters change. A key lets you access the widget's value via st.session_state[key] (read-only). If key is provided, it will also be used as a CSS class name prefixed with st-key-.
          default: None
          kwarg_only: true
        help:
          type: str or None
          description: A tooltip that gets displayed next to the widget label. Streamlit only displays the tooltip when label_visibility="visible". If None (default), no tooltip is displayed. Supports GitHub-flavored Markdown.
          default: None
          kwarg_only: true
        on_change:
          type: callable
          description: An optional callback invoked when this audio input's value changes.
          default: None
          kwarg_only: true
        args:
          type: list or tuple
          description: An optional list or tuple of args to pass to the callback.
          default: None
          kwarg_only: true
        kwargs:
          type: dict
          description: An optional dict of kwargs to pass to the callback.
          default: None
          kwarg_only: true
        disabled:
          type: bool
          description: Disables the audio input if set to True. Default is False.
          default: 'False'
          kwarg_only: true
        label_visibility:
          type: '"visible", "hidden", or "collapsed"'
          description: 'The visibility of the label. Default is "visible". "hidden": empty spacer instead of label. "collapsed": no label or spacer.'
          default: '"visible"'
          kwarg_only: true
        width:
          type: '"stretch" or int'
          description: '"stretch" (default): matches parent container width. An integer: fixed width in pixels, capped at parent container.'
          default: '"stretch"'
          kwarg_only: true
      returns:
      - type: None or UploadedFile
        description: The UploadedFile class is a subclass of BytesIO and therefore "file-like". MIME type is audio/wav. Note: subject to server.maxUploadSize limit.
    streamlit.button:
      signature: st.button(label, key=None, help=None, on_click=None, args=None, kwargs=None, *, type="secondary", icon=None,
        icon_position="left", disabled=False, use_container_width=None, width="content", shortcut=None)
      description: Display a button widget.
      source: lib/streamlit/elements/widgets/button.py#L133
      parameters:
        label:
          type: str
          description: A short label explaining to the user what this button is for. Supports GitHub-flavored Markdown (Bold, Italics, Strikethroughs, Inline Code, Links, Images). Unsupported Markdown elements are unwrapped so only their children render.
        key:
          type: str, int, or None
          description: An optional string or integer to use as the unique key for the widget. If None (default), a key is generated based on other parameters. Assigning a key stabilizes identity and preserves state across reruns. Access value via st.session_state[key] (read-only). Also used as CSS class name prefixed with st-key-.
          default: None
        help:
          type: str or None
          description: A tooltip displayed when the button is hovered over. If None (default), no tooltip. Supports GitHub-flavored Markdown.
          default: None
        on_click:
          type: callable
          description: An optional callback invoked when this button is clicked.
          default: None
        args:
          type: list or tuple
          description: An optional list or tuple of args to pass to the callback.
          default: None
        kwargs:
          type: dict
          description: An optional dict of kwargs to pass to the callback.
          default: None
        type:
          type: '"primary", "secondary", or "tertiary"'
          description: '"primary": primary color background for emphasis. "secondary" (default): coordinates with app background. "tertiary": plain text without border or background.'
          default: '"secondary"'
          kwarg_only: true
        icon:
          type: str or None
          description: 'An optional emoji or icon next to the button label. If None (default), no icon. Options: a single-character emoji (e.g. "🚨"), a Material Symbols icon (":material/icon_name:"), or "spinner".'
          default: None
          kwarg_only: true
        icon_position:
          type: '"left" or "right"'
          description: The position of the icon relative to the button label. Defaults to "left".
          default: '"left"'
          kwarg_only: true
        disabled:
          type: bool
          description: Disables the button if set to True. Default is False.
          default: 'False'
          kwarg_only: true
        use_container_width:
          type: bool
          description: 'Whether to expand the button''s width to fill its parent container. False (default): sizes to fit contents. True: matches parent container width. Contents line wrap if wider than parent.'
          default: None
          kwarg_only: true
        width:
          type: '"content", "stretch", or int'
          description: '"content" (default): matches content width, capped at parent. "stretch": matches parent width. Integer: fixed width in pixels, capped at parent.'
          default: '"content"'
          kwarg_only: true
        shortcut:
          type: str or None
          description: 'An optional keyboard shortcut. Options: alphanumeric key ("K"), function key ("F11"), special key ("Enter", "Esc", "Tab"), or combinations with modifiers ("Ctrl+K", "Cmd+Shift+O"). Modifiers: Alt, Ctrl, Cmd, Meta, Mod, Option, Shift. "C" and "R" are reserved. Punctuation keys not supported.'
          default: None
          kwarg_only: true
      returns:
      - type: bool
        description: True if the button was clicked on the last run of the app, False otherwise.
