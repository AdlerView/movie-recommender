            (text contents) render. Common block-level Markdown (headings,
            lists, blockquotes) is automatically escaped and displays as
            literal text in labels.
            See the body parameter of st.markdown for additional,
            supported Markdown directives.
        expanded:
          type: bool
          description: If True, initializes the expander in "expanded" state. Defaults to False (collapsed).
          default: 'False'
        key:
          type: str, int, or None
          description: Unique key for the widget. If None (default), auto-generated. When on_change is "rerun" or callable, key enables reading/updating expanded state via st.session_state[key].
          default: None
          kwarg_only: true
        icon:
          type: str, None
          description: >-
            An optional emoji or icon to display next to the expander label. If icon is None (default), no icon is displayed. Options:
            - A single-character emoji (e.g. "🚨" or "🔥"). Emoji short codes are not supported.
            - A Material Symbols icon: ":material/icon_name:" (rounded style, snake case).
            - "spinner": Displays a spinner as an icon.
          default: None
          kwarg_only: true
        width:
          type: '"stretch" or int'
          description: '"stretch" (default): matches parent width. Integer: fixed width in pixels, capped at parent.'
          default: '"stretch"'
          kwarg_only: true
        on_change:
          type: '"ignore", "rerun", or callable'
          description: >-
            How the expander should respond when the user expands or
            collapses it. This controls whether the expander tracks state
            and triggers reruns. on_change can be one of the following:
