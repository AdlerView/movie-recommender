          default: '"stretch"'
          kwarg_only: true
        height:
          type: '"stretch", "content", or int'
          description: '"content" (default): matches content height. "stretch": matches content or parent container height, whichever is larger. Integer: fixed height in pixels with scrolling if content exceeds.'
          default: '"content"'
          kwarg_only: true
        use_container_width:
          type: bool or None
          description: 'Override chart native width with parent container width. None (default): chart default behavior. True: match parent. False: fit contents up to parent width.'
          default: None
          kwarg_only: true
    streamlit.vega_lite_chart:
      signature: st.vega_lite_chart(data=None, spec=None, *, width=None, height="content", use_container_width=None, theme="streamlit",
        key=None, on_select="ignore", selection_mode=None, **kwargs)
      description: >-
        Display a chart using the Vega-Lite library.
        Vega-Lite is a high-level
        grammar for defining interactive graphics.
      source: lib/streamlit/elements/vega_charts.py#L2054
      parameters:
        data:
          type: Anything supported by st.dataframe
          description: Either the data to be plotted or a Vega-Lite spec containing the data (closer to Vega-Lite API).
          default: None
        spec:
          type: dict or None
          description: The Vega-Lite spec for the chart. If None (default), uses the spec from data. Cannot pass spec to both data and spec.
          default: None
        width:
          type: '"stretch", "content", int, or None'
          description: >-
            The width of the chart element. This can be one of the following:
            "stretch": The width of the element matches the width of the
            parent container.
            "content": The width of the element matches the width of its
            content, but doesn't exceed the width of the parent container.
            An integer specifying the width in pixels: The element has a
            fixed width. If the specified width is greater than the width of
            the parent container, the width of the element matches the width
            of the parent container.
            None (default): Streamlit uses "stretch" for most charts,
            and uses "content" for the following multi-view charts:
            Facet charts: the spec contains "facet" or encodings for
            "row", "column", or "facet".
            Horizontal concatenation charts: the spec contains
            "hconcat".
            Repeat charts: the spec contains "repeat".
            Nested composition charts: the spec contains "vconcat"
            with nested "hconcat", "vconcat", "concat", or
            "layer" operators (e.g., scatter plots with marginal
            histograms).
          default: None
          kwarg_only: true
        height:
          type: '"content", "stretch", or int'
          description: '"content" (default): matches content height. "stretch": matches content or parent container height, whichever is larger. Integer: fixed height in pixels with scrolling if content exceeds.'
          default: '"content"'
          kwarg_only: true
        use_container_width:
          type: bool or None
          description: 'Override chart width with parent container. None (default): uses parent width except for Facet/HConcat/Repeat charts. True: match parent. False: fit contents up to parent width.'
          default: None
          kwarg_only: true
        theme:
          type: '"streamlit" or None'
          description: '"streamlit" (default): Streamlit''s own design. None: falls back to library default. Customizable via theme.chartCategoricalColors and theme.chartSequentialColors config options.'
