          kwarg_only: true
        width:
          type: '"stretch", "content", or int'
          description: '"stretch" (default): matches parent container width. "content": matches content width, capped at parent. Integer: fixed width in pixels, capped at parent.'
          default: '"stretch"'
          kwarg_only: true
        height:
          type: '"content", "stretch", or int'
          description: '"content" (default): matches content height. "stretch": matches content or parent container height, whichever is larger. Integer: fixed height in pixels with scrolling if content exceeds.'
          default: '"content"'
          kwarg_only: true
        use_container_width:
          type: bool or None
          description: 'Override chart native width with parent container width. None (default): chart default behavior. True: match parent. False: fit contents up to parent width.'
          default: None
          kwarg_only: true
    streamlit.map:
      signature: st.map(data=None, *, latitude=None, longitude=None, color=None, size=None, zoom=None, width="stretch", height=500,
        use_container_width=None)
      description: >-
        Display a map with a scatterplot overlaid onto it.
        This is a wrapper around st.pydeck_chart to quickly create
        scatterplot charts on top of a map, with auto-centering and auto-zoom.
        When using this command, a service called Carto provides the map tiles to render
        map content. If you're using advanced PyDeck features you may need to obtain
        an API key from Carto first. You can do that as
        pydeck.Deck(api_keys={"carto": YOUR_KEY}) or by setting the CARTO_API_KEY
        environment variable. See PyDeck's documentation for more information.
        Another common provider for map tiles is Mapbox. If you prefer to use that,
        you'll need to create an account at https://mapbox.com and specify your Mapbox
        key when creating the pydeck.Deck object. You can do that as
        pydeck.Deck(api_keys={"mapbox": YOUR_KEY}) or by setting the MAPBOX_API_KEY
        environment variable.
        Carto and Mapbox are third-party products and Streamlit accepts no responsibility
        or liability of any kind for Carto or Mapbox, or for any content or information
        made available by Carto or Mapbox. The use of Carto or Mapbox is governed by
        their respective Terms of Use.
      source: lib/streamlit/elements/map.py#L89
      parameters:
        data:
          type: Anything supported by st.dataframe
          description: The data to be plotted.
          default: None
        latitude:
          type: str or None
          description: >-
            The name of the column containing the latitude coordinates of
            the datapoints in the chart.
            If None, the latitude data will come from any column named 'lat',
            'latitude', 'LAT', or 'LATITUDE'.
          default: None
          kwarg_only: true
        longitude:
          type: str or None
          description: >-
            The name of the column containing the longitude coordinates of
            the datapoints in the chart.
            If None, the longitude data will come from any column named 'lon',
            'longitude', 'LON', or 'LONGITUDE'.
          default: None
          kwarg_only: true
        color:
          type: str or tuple or None
          description: >-
            The color of the circles representing each datapoint.
            Can be:
            None, to use the default color.
            A hex string like "#ffaa00" or "#ffaa0088".
            An RGB or RGBA tuple with the red, green, blue, and alpha
            components specified as ints from 0 to 255 or floats from 0.0 to
            1.0.
            The name of the column to use for the color. Cells in this column
            should contain colors represented as a hex string or color tuple,
            as described above.
          default: None
          kwarg_only: true
        size:
          type: str or float or None
          description: >-
            The size of the circles representing each point, in meters.
            This can be:
            None, to use the default size.
            A number like 100, to specify a single size to use for all
            datapoints.
            The name of the column to use for the size. This allows each
            datapoint to be represented by a circle of a different size.
          default: None
          kwarg_only: true
        zoom:
          type: int
          description: Zoom level as specified in https://wiki.openstreetmap.org/wiki/Zoom_levels.
          default: None
          kwarg_only: true
        width:
          type: '"stretch" or int'
          description: >-
            The width of the chart element. This can be one of the following:
            "stretch" (default): The width of the element matches the
            width of the parent container.
            An integer specifying the width in pixels: The element has a
            fixed width. If the specified width is greater than the width of
            the parent container, the width of the element matches the width
            of the parent container.
          default: '"stretch"'
          kwarg_only: true
        height:
          type: '"stretch" or int'
          description: >-
            The height of the chart element. This can be one of the following:
            An integer specifying the height in pixels: The element has a
            fixed height. If the content is larger than the specified
            height, scrolling is enabled. This is 500 by default.
            "stretch": The height of the element matches the height of
            its content or the height of the parent container, whichever is
            larger. If the element is not in a parent container, the height
            of the element matches the height of its content.
          default: '500'
          kwarg_only: true
        use_container_width:
          type: bool or None
          description: 'Override map width with parent container. None (default): map default behavior. True: match parent. False: fit contents up to parent width.'
          default: None
          kwarg_only: true
    streamlit.plotly_chart:
      signature: st.plotly_chart(figure_or_data, use_container_width=None, *, width="stretch", height="content", theme="streamlit",
        key=None, on_select="ignore", selection_mode=('points', 'box', 'lasso'), config=None, **kwargs)
      description: >-
        Display an interactive Plotly chart.
        Plotly is a charting library for Python.
        The arguments to this function closely follow the ones for Plotly's
        plot() function.
        To show Plotly charts in Streamlit, call st.plotly_chart wherever
        you would call Plotly's py.plot or py.iplot.
        Important
        You must install plotly>=4.0.0 to use this command. Your app's
        performance may be enhanced by installing orjson as well. You
        can install all charting dependencies (except Bokeh) as an extra
        with Streamlit:
        pip install streamlit[charts]
      source: lib/streamlit/elements/plotly_chart.py#L415
      parameters:
        figure_or_data:
          type: plotly.graph_objs.Figure, plotly.graph_objs.Data,            or dict/list of plotly.graph_objs.Figure/Data
          description: 'The Plotly Figure or Data object to render. Note: charts with >1000 data points use WebGL renderer. For multiple WebGL contexts per page, switch to SVG with render_mode="svg".'
        width:
          type: '"stretch", "content", or int'
          description: '"stretch" (default): matches parent container width. "content": matches content width, capped at parent. Integer: fixed width in pixels, capped at parent.'
          default: '"stretch"'
          kwarg_only: true
        height:
          type: '"content", "stretch", or int'
          description: '"content" (default): matches content height. "stretch": matches content or parent container height, whichever is larger. Integer: fixed height in pixels with scrolling if content exceeds.'
          default: '"content"'
          kwarg_only: true
        use_container_width:
          type: bool or None
          description: 'Override figure native width with parent container width. None (default): uses width parameter. True: match parent. False: fit contents up to parent width.'
          default: None
        theme:
          type: '"streamlit" or None'
          description: '"streamlit" (default): Streamlit''s own design. None: falls back to library default. Customizable via theme.chartCategoricalColors and theme.chartSequentialColors config options.'
          default: '"streamlit"'
          kwarg_only: true
        key:
          type: str, int, or None
          description: An optional string for stable element identity. If None (default), identity based on other parameters. If selections are activated and key is provided, selection state is stored in Session State (read-only). Also used as CSS class st-key-.
          default: None
          kwarg_only: true
        on_select:
          type: '"ignore" or "rerun" or callable'
          description: >-
            How the figure should respond to user selection events. This
            controls whether or not the figure behaves like an input widget.
            on_select can be one of the following:
            "ignore" (default): Streamlit will not react to any selection
            events in the chart. The figure will not behave like an input
            widget.
            "rerun": Streamlit will rerun the app when the user selects
            data in the chart. In this case, st.plotly_chart will return
            the selection data as a dictionary.
            A callable: Streamlit will rerun the app and execute the
            callable as a callback function before the rest of the app.
            In this case, st.plotly_chart will return the selection data
            as a dictionary.
          default: '"ignore"'
          kwarg_only: true
        selection_mode:
          type: '"points", "box", "lasso" or an Iterable of these'
          description: >-
            The selection mode of the chart. This can be one of the following:
            "points": The chart will allow selections based on individual
            data points.
            "box": The chart will allow selections based on rectangular
            areas.
            "lasso": The chart will allow selections based on freeform
            areas.
            An Iterable of the above options: The chart will allow
            selections based on the modes specified.
            All selections modes are activated by default.
          default: ('points', 'box', 'lasso')
          kwarg_only: true
        config:
          type: dict or None
          description: A dictionary of Plotly configuration options passed to Plotly's show() function.
          default: None
          kwarg_only: true
        '**kwargs':
          type: null
          description: Additional arguments accepted by Plotly's plot() function, including config for Plotly configuration options.
          kwarg_only: true
      returns:
      - type: element or dict
        description: 'If on_select is "ignore" (default), returns an internal placeholder. Otherwise, returns a dict-like PlotlyState object with key and attribute notation.'
    streamlit.pydeck_chart:
      signature: st.pydeck_chart(pydeck_obj=None, *, width="stretch", use_container_width=None, height=500, selection_mode="single-object",
        on_select="ignore", key=None)
      description: >-
        Draw a chart using the PyDeck library.
        This supports 3D maps, point clouds, and more! More info about PyDeck
        at https://deckgl.readthedocs.io/en/latest/.
        These docs are also quite useful:
        DeckGL docs: https://github.com/uber/deck.gl/tree/master/docs
        DeckGL JSON docs: https://github.com/uber/deck.gl/tree/master/modules/json
        When using this command, a service called Carto provides the map tiles to render
        map content. If you're using advanced PyDeck features you may need to obtain
        an API key from Carto first. You can do that as
        pydeck.Deck(api_keys={"carto": YOUR_KEY}) or by setting the CARTO_API_KEY
        environment variable. See PyDeck's documentation for more information.
        Another common provider for map tiles is Mapbox. If you prefer to use that,
        you'll need to create an account at https://mapbox.com and specify your Mapbox
        key when creating the pydeck.Deck object. You can do that as
        pydeck.Deck(api_keys={"mapbox": YOUR_KEY}) or by setting the MAPBOX_API_KEY
        environment variable.
        Carto and Mapbox are third-party products and Streamlit accepts no responsibility
        or liability of any kind for Carto or Mapbox, or for any content or information
        made available by Carto or Mapbox. The use of Carto or Mapbox is governed by
        their respective Terms of Use.
        Note
        Pydeck uses two WebGL contexts per chart, and different browsers
        have different limits on the number of WebGL contexts per page.
        If you exceed this limit, the oldest contexts will be dropped to
        make room for the new ones. To avoid this limitation in most
        browsers, don't display more than eight Pydeck charts on a single
        page.
      source: lib/streamlit/elements/deck_gl_json_chart.py#L300
      parameters:
        pydeck_obj:
          type: pydeck.Deck or None
          description: Object specifying the PyDeck chart to draw.
          default: None
        width:
          type: '"stretch" or int'
          description: >-
            The width of the chart element. This can be one of the following:
            "stretch" (default): The width of the element matches the
            width of the parent container.
            An integer specifying the width in pixels: The element has a
            fixed width. If the specified width is greater than the width of
            the parent container, the width of the element matches the width
            of the parent container.
          default: '"stretch"'
          kwarg_only: true
        use_container_width:
          type: bool or None
          description: 'Override chart native width with parent container width. None (default): chart default behavior. True: match parent. False: fit contents up to parent width.'
          default: None
          kwarg_only: true
        height:
          type: '"stretch" or int'
          description: >-
            The height of the chart element. This can be one of the following:
            An integer specifying the height in pixels: The element has a
            fixed height. If the content is larger than the specified
            height, scrolling is enabled. This is 500 by default.
            "stretch": The height of the element matches the height of
            its content or the height of the parent container, whichever is
            larger. If the element is not in a parent container, the height
            of the element matches the height of its content.
          default: '500'
          kwarg_only: true
        on_select:
          type: '"ignore" or "rerun" or callable'
          description: >-
            How the figure should respond to user selection events. This controls
            whether or not the chart behaves like an input widget.
            on_select can be one of the following:
            "ignore" (default): Streamlit will not react to any selection
            events in the chart. The figure will not behave like an
            input widget.
            "rerun": Streamlit will rerun the app when the user selects
            data in the chart. In this case, st.pydeck_chart will return
            the selection data as a dictionary.
            A callable: Streamlit will rerun the app and execute the callable
            as a callback function before the rest of the app. In this case,
            st.pydeck_chart will return the selection data as a
            dictionary.
            If on_select is not "ignore", all layers must have a
            declared id to keep the chart stateful across reruns.
          default: '"ignore"'
          kwarg_only: true
        selection_mode:
          type: '"single-object" or "multi-object"'
          description: >-
            The selection mode of the chart. This can be one of the following:
            "single-object" (default): Only one object can be selected at
            a time.
            "multi-object": Multiple objects can be selected at a time.
          default: '"single-object"'
          kwarg_only: true
        key:
          type: str, int, or None
          description: An optional string for stable element identity. If None (default), identity based on other parameters. If selections are activated and key is provided, selection state is stored in Session State (read-only). Also used as CSS class st-key-.
          default: None
          kwarg_only: true
      returns:
      - type: element or dict
        description: 'If on_select is "ignore" (default), returns an internal placeholder. Otherwise, returns a dict-like PydeckState object with key and attribute notation.'
    streamlit.pyplot:
