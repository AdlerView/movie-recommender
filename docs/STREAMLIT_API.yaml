    streamlit.download_button:
      signature: st.download_button(label, data, file_name=None, mime=None, key=None, help=None, on_click="rerun", args=None,
        kwargs=None, *, type="secondary", icon=None, icon_position="left", disabled=False, use_container_width=None, width="content",
        shortcut=None)
      description: >-
        Display a download button widget.
        This is useful when you would like to provide a way for your users
        to download a file directly from your app.
        If you pass the data directly to the data parameter, then the data
        is stored in-memory while the user is connected. It's a good idea to
        keep file sizes under a couple hundred megabytes to conserve memory or
        use deferred data generation by passing a callable to the data
        parameter.
        If you want to prevent your app from rerunning when a user clicks the
        download button, wrap the download button in a fragment.
      source: lib/streamlit/elements/widgets/button.py#L395
      parameters:
        label:
          type: str
          description: >-
            A short label explaining to the user what this button is for.
            The label can optionally contain GitHub-flavored Markdown of the
            following types: Bold, Italics, Strikethroughs, Inline Code, Links,
            and Images. Images display like icons, with a max height equal to
            the font height.
            Unsupported Markdown elements are unwrapped so only their children
            (text contents) render. Common block-level Markdown (headings,
            lists, blockquotes) is automatically escaped and displays as
            literal text in labels.
            See the body parameter of st.markdown for additional,
            supported Markdown directives.
        data:
          type: str, bytes, file-like, or callable
          description: >-
            The contents of the file to be downloaded or a callable that
            returns the contents of the file.
            File contents can be a string, bytes, or file-like object.
            File-like objects include io.BytesIO, io.StringIO, or any
            class that implements the abstract base class io.RawIOBase.
            If a callable is passed, it is executed when the user clicks
            the download button and runs on a separate thread from the
            resulting script rerun. This deferred generation is helpful for
            large files to avoid blocking the page script. The callable can't
            accept any arguments. If any Streamlit commands are executed inside
            the callable, they will be ignored.
            To prevent unnecessary recomputation, use caching when converting
            your data for download. For more information, see the Example 1
            below.
        file_name:
          type: str
          description: >-
            An optional string to use as the name of the file to be downloaded,
            such as "my_file.csv". If not specified, the name will be
            automatically generated.
          default: None
        mime:
          type: str or None
          description: >-
            The MIME type of the data. If this is None (default), Streamlit
            sets the MIME type depending on the value of data as follows:
            If data is a string or textual file (i.e. str or
            io.TextIOWrapper object), Streamlit uses the "text/plain"
            MIME type.
            If data is a binary file or bytes (i.e. bytes,
            io.BytesIO, io.BufferedReader, or io.RawIOBase
            object), Streamlit uses the "application/octet-stream" MIME type.
            For more information about MIME types, see
            https://www.iana.org/assignments/media-types/media-types.xhtml.
          default: None
        key:
          type: str, int, or None
          description: An optional string or integer to use as the unique key for the widget. If None (default), a key is generated based on other parameters. Assigning a key stabilizes identity and preserves state across reruns. Access value via st.session_state[key] (read-only). Also used as CSS class name prefixed with st-key-.
          default: None
        help:
          type: str or None
          description: A tooltip displayed when the button is hovered over. If None (default), no tooltip. Supports GitHub-flavored Markdown.
          default: None
        on_click:
          type: callable, "rerun", "ignore", or None
          description: >-
            How the button should respond to user interaction. This controls
            whether or not the button triggers a rerun and if a callback
            function is called. This can be one of the following values:
            "rerun" (default): The user downloads the file and the app
            reruns. No callback function is called.
            "ignore": The user downloads the file and the app doesn't
            rerun. No callback function is called.
            A callable: The user downloads the file and app reruns. The
            callable is called before the rest of the app.
            None: This is same as on_click="rerun". This value exists
            for backwards compatibility and shouldn't be used.
          default: '"rerun"'
        args:
          type: list or tuple
          description: An optional list or tuple of args to pass to the callback.
          default: None
        kwargs:
          type: dict
          description: An optional dict of kwargs to pass to the callback.
          default: None
        type:
          type: '"primary", "secondary", or "tertiary"'
          description: '"primary": primary color background for emphasis. "secondary" (default): coordinates with app background. "tertiary": plain text without border or background.'
          default: '"secondary"'
          kwarg_only: true
        icon:
          type: str or None
          description: >-
            An optional emoji or icon to display next to the button label. If icon is None (default), no icon is displayed. If icon is a string, the following options are valid:
            - A single-character emoji (e.g. icon="🚨" or icon="🔥"). Emoji short codes are not supported.
            - An icon from the Material Symbols library (rounded style) in the format ":material/icon_name:" where "icon_name" is the name of the icon in snake case. Example: icon=":material/thumb_up:".
            - "spinner": Displays a spinner as an icon.
          default: None
          kwarg_only: true
        icon_position:
          type: '"left" or "right"'
          description: The position of the icon relative to the button label. Defaults to "left".
          default: '"left"'
          kwarg_only: true
        disabled:
          type: bool
          description: Disables the download button if set to True. Default is False.
          default: 'False'
          kwarg_only: true
        use_container_width:
          type: bool
          description: 'Whether to expand button width. False (default): sizes to fit contents. True: matches parent. Contents line wrap if wider than parent.'
          default: None
          kwarg_only: true
        width:
          type: '"content", "stretch", or int'
          description: '"content" (default): matches content width, capped at parent. "stretch": matches parent width. Integer: fixed width in pixels, capped at parent.'
          default: '"content"'
          kwarg_only: true
        shortcut:
          type: str or None
          description: 'An optional keyboard shortcut. Same options as st.button. "C" and "R" are reserved. Punctuation keys not supported.'
          default: None
          kwarg_only: true
      returns:
      - type: bool
        description: True if the button was clicked on the last run of the app, False otherwise.
    streamlit.feedback:
      signature: st.feedback(options="thumbs", *, key=None, default=None, disabled=False, on_change=None, args=None, kwargs=None,
        width="content")
      description: >-
        Display a feedback widget.
        A feedback widget is an icon-based button group available in three
        styles, as described in options. It is commonly used in chat and AI
        apps to allow users to rate responses.
      source: lib/streamlit/elements/widgets/feedback.py#L136
      parameters:
        options:
          type: '"thumbs", "faces", or "stars"'
          description: >-
            The feedback options displayed to the user. options can be one
            of the following:
            "thumbs" (default): Streamlit displays a thumb-up and
            thumb-down button group.
            "faces": Streamlit displays a row of five buttons with
            facial expressions depicting increasing satisfaction from left to
            right.
            "stars": Streamlit displays a row of star icons, allowing the
            user to select a rating from one to five stars.
          default: '"thumbs"'
        key:
          type: str, int, or None
          description: Unique key for the widget. Stabilizes identity across reruns. Note: changing options resets widget even with a key. Read/update via st.session_state[key]. Also CSS class st-key-.
          default: None
          kwarg_only: true
        default:
          type: int or None
          description: >-
            Default feedback value. This must be consistent with the feedback
            type in options:
            0 or 1 if options="thumbs".
            Between 0 and 4, inclusive, if options="faces" or
            options="stars".
          default: None
          kwarg_only: true
        disabled:
          type: bool
          description: Disables the feedback widget if set to True. Default is False.
          default: 'False'
          kwarg_only: true
        on_change:
          type: callable
          description: An optional callback invoked when this feedback widget's value changes.
          default: None
          kwarg_only: true
        args:
          type: list or tuple
          description: An optional list or tuple of args to pass to the callback.
          default: None
          kwarg_only: true
        kwargs:
          type: dict
          description: An optional dict of kwargs to pass to the callback.
          default: None
          kwarg_only: true
        width:
          type: '"content", "stretch", or int'
          description: '"content" (default): matches content width, capped at parent. "stretch": matches parent width. Integer: fixed width in pixels, capped at parent.'
          default: '"content"'
          kwarg_only: true
      returns:
      - type: int or None
        description: >-
          An integer indicating the user's selection, where 0 is the
          lowest feedback. Higher values indicate more positive feedback.
          If no option was selected, the widget returns None.
          For options="thumbs", a return value of 0 indicates
          thumbs-down, and 1 indicates thumbs-up.
          For options="faces" and options="stars", return values
          range from 0 (least satisfied) to 4 (most satisfied).
    streamlit.file_uploader:
      signature: st.file_uploader(label, type=None, accept_multiple_files=False, key=None, help=None, on_change=None, args=None,
        kwargs=None, *, max_upload_size=None, disabled=False, label_visibility="visible", width="stretch")
      description: >-
        Display a file uploader widget.
        By default, uploaded files are limited to 200 MB each. You can
        configure this globally using the server.maxUploadSize configuration
        option. For more information on how to set configuration options, see
        config.toml. Additionally, you can set a per-widget limit using the
        max_upload_size parameter.
      source: lib/streamlit/elements/widgets/file_uploader.py#L251
      parameters:
        label:
          type: str
          description: >-
            A short label explaining to the user what this file uploader is for.
            The label can optionally contain GitHub-flavored Markdown of the
            following types: Bold, Italics, Strikethroughs, Inline Code, Links,
            and Images. Images display like icons, with a max height equal to
            the font height.
            Unsupported Markdown elements are unwrapped so only their children
            (text contents) render. Common block-level Markdown (headings,
            lists, blockquotes) is automatically escaped and displays as
            literal text in labels.
            See the body parameter of st.markdown for additional,
            supported Markdown directives.
            For accessibility reasons, you should never set an empty label, but
            you can hide it with label_visibility if needed. In the future,
            we may disallow empty labels by raising an exception.
        type:
          type: str, list of str, or None
          description: >-
            The allowed file extension(s) for uploaded files. This can be one
            of the following types:
            None (default): All file extensions are allowed.
            A string: A single file extension is allowed. For example, to
            only accept CSV files, use "csv".
            A sequence of strings: Multiple file extensions are allowed. For
            example, to only accept JPG/JPEG and PNG files, use
            ["jpg", "jpeg", "png"].
            Note
            This is a best-effort check, but doesn't provide a
            security guarantee against users uploading files of other types
            or type extensions. The correct handling of uploaded files is
            part of the app developer's responsibility.
          default: None
        max_upload_size:
          type: int or None
          description: Max upload file size in MB. None (default) uses server.maxUploadSize from config.toml. A positive integer overrides that config.
          default: None
          kwarg_only: true
        accept_multiple_files:
          type: bool or "directory"
          description: >-
            Whether to accept more than one file in a submission. This can be one
            of the following values:
            False (default): The user can only submit one file at a time.
            True: The user can upload multiple files at the same time.
            "directory": The user can select a directory to upload all
            files in the directory and its subdirectories. If type is
            set, only files matching those type(s) will be uploaded.
            When this is True or "directory", the return value will be
            a list and a user can additively select files if they click the
            browse button on the widget multiple times.
          default: 'False'
        key:
          type: str, int, or None
          description: Unique key for the widget. Stabilizes identity across reruns. Note: changing type, accept_multiple_files, or max_upload_size resets widget even with a key. Access via st.session_state[key] (read-only).
            Additionally, if key is provided, it will be used as a
            CSS class name prefixed with st-key-.
          default: None
        help:
          type: str or None
          description: A tooltip displayed next to the widget label (only when label_visibility="visible"). If None (default), no tooltip. Supports GitHub-flavored Markdown.
          default: None
        on_change:
          type: callable
          description: An optional callback invoked when this file_uploader's value changes.
          default: None
        args:
          type: list or tuple
          description: An optional list or tuple of args to pass to the callback.
          default: None
        kwargs:
          type: dict
          description: An optional dict of kwargs to pass to the callback.
          default: None
        disabled:
          type: bool
          description: Disables the file uploader if set to True. Default is False.
          default: 'False'
          kwarg_only: true
        label_visibility:
          type: '"visible", "hidden", or "collapsed"'
          description: 'The visibility of the label. Default is "visible". "hidden": empty spacer instead of label. "collapsed": no label or spacer.'
          default: '"visible"'
          kwarg_only: true
        width:
          type: '"stretch" or int'
          description: '"stretch" (default): matches parent width. Integer: fixed width in pixels, capped at parent.'
          default: '"stretch"'
          kwarg_only: true
      returns:
      - type: None, UploadedFile, or list of UploadedFile
        description: >-
          If accept_multiple_files is False, returns either None or
          an UploadedFile object.
          If accept_multiple_files is True or "directory", returns
          a list with the uploaded files as UploadedFile objects. If no
          files were uploaded, returns an empty list.
          The UploadedFile class is a subclass of BytesIO, and
          therefore is "file-like". This means you can pass an instance of it
          anywhere a file is expected.
