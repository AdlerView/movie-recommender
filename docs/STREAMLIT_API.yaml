          default: None
        kwargs:
          type: dict
          description: An optional dict of kwargs to pass to the callback.
          default: None
        max_selections:
          type: int or None
          description: Max selections allowed at once. None (default) means no limit. Must be a positive integer if set.
          default: None
          kwarg_only: true
        placeholder:
          type: str or  None
          description: >-
