  charts:
    streamlit.altair_chart:
      signature: st.altair_chart(altair_chart, *, width=None, height="content", use_container_width=None, theme="streamlit",
        key=None, on_select="ignore", selection_mode=None)
      description: >-
        Display a chart using the Vega-Altair library.
        Vega-Altair is a declarative
        statistical visualization library for Python, based on Vega and
        Vega-Lite.
      source: lib/streamlit/elements/vega_charts.py#L1823
      parameters:
        altair_chart:
          type: altair.Chart
          description: The Altair chart object to display. See https://altair-viz.github.io/gallery/ for examples.
        width:
          type: '"stretch", "content", int, or None'
          description: >-
            The width of the chart element. This can be one of the following:
            "stretch": The width of the element matches the width of the
            parent container.
            "content": The width of the element matches the width of its
            content, but doesn't exceed the width of the parent container.
            An integer specifying the width in pixels: The element has a
            fixed width. If the specified width is greater than the width of
            the parent container, the width of the element matches the width
            of the parent container.
            None (default): Streamlit uses "stretch" for most charts,
            and uses "content" for the following multi-view charts:
            Facet charts: the spec contains "facet" or encodings for
            "row", "column", or "facet".
            Horizontal concatenation charts: the spec contains
            "hconcat".
            Repeat charts: the spec contains "repeat".
            Nested composition charts: the spec contains "vconcat"
            with nested "hconcat", "vconcat", "concat", or
            "layer" operators (e.g., scatter plots with marginal
            histograms).
          default: None
          kwarg_only: true
        height:
          type: '"content", "stretch", or int'
          description: '"content" (default): matches content height. "stretch": matches content or parent container height, whichever is larger. Integer: fixed height in pixels with scrolling if content exceeds.'
          default: '"content"'
          kwarg_only: true
        use_container_width:
          type: bool or None
          description: 'Override chart width with parent container. None (default): uses parent width except for Facet/HConcat/Repeat charts. True: match parent. False: fit contents up to parent width.'
          default: None
          kwarg_only: true
        theme:
          type: '"streamlit" or None'
          description: '"streamlit" (default): Streamlit''s own design. None: falls back to library default. Customizable via theme.chartCategoricalColors and theme.chartSequentialColors config options.'
          default: '"streamlit"'
          kwarg_only: true
        key:
          type: str, int, or None
          description: An optional string for stable element identity. If None (default), identity is based on other parameters. If selections are activated and key is provided, the selection state is stored in Session State (read-only). Also used as CSS class name prefixed with st-key-.
          default: None
          kwarg_only: true
        on_select:
          type: '"ignore", "rerun", or callable'
          description: >-
            How the figure should respond to user selection events. This
            controls whether or not the figure behaves like an input widget.
            on_select can be one of the following:
            "ignore" (default): Streamlit will not react to any selection
            events in the chart. The figure will not behave like an input
            widget.
            "rerun": Streamlit will rerun the app when the user selects
            data in the chart. In this case, st.altair_chart will return
            the selection data as a dictionary.
            A callable: Streamlit will rerun the app and execute the
            callable as a callback function before the rest of the app.
            In this case, st.altair_chart will return the selection data
            as a dictionary.
            To use selection events, the object passed to altair_chart must
            include selection parameters. To learn about defining interactions
            in Altair and how to declare selection-type parameters, see
            Interactive Charts
            in Altair's documentation.
            For consistent selection output, especially in multi-view charts
            (layer, hconcat, vconcat, facet, repeat), specify fields or
            encodings in your selection, like
            alt.selection_point(fields=["Origin"]) or
            alt.selection_point(encodings=["x", "y"]). Without explicit
            fields, Vega may add an internal row identifier field (vgsid)
            to your data, and selections can then return this identifier
            instead of your original data values.
          default: '"ignore"'
          kwarg_only: true
        selection_mode:
          type: str or Iterable of str
          description: The selection parameters Streamlit should use. If None (default), uses all selection parameters defined in the chart spec. Used parameters trigger reruns and are included in selection state. Unused parameters are ignored. Identified by their name property.
          default: None
          kwarg_only: true
      returns:
      - type: element or dict
        description: 'If on_select is "ignore" (default), returns an internal placeholder (supports .add_rows()). Otherwise, returns a dict-like VegaLiteState object with key and attribute notation.'
    streamlit.area_chart:
      signature: st.area_chart(data=None, *, x=None, y=None, x_label=None, y_label=None, color=None, stack=None, width="stretch",
        height="content", use_container_width=None)
      description: >-
        Display an area chart.
        This is syntax-sugar around st.altair_chart. The main difference
        is this command uses the data's own column and indices to figure out
        the chart's Altair spec. As a result this is easier to use for many
        "just plot this" scenarios, while being less customizable.
      source: lib/streamlit/elements/vega_charts.py#L915
      parameters:
        data:
          type: Anything supported by st.dataframe
          description: Data to be plotted.
          default: None
        x:
          type: str or None
          description: Column name or key for the x-axis data. If None (default), Streamlit uses the data index.
          default: None
          kwarg_only: true
        y:
          type: str, Sequence of str, or None
          description: Column name(s) or key(s) for the y-axis data. If None (default), Streamlit draws all remaining columns as data series. If a Sequence of strings, Streamlit melts wide-format to long-format behind the scenes.
          default: None
          kwarg_only: true
        x_label:
          type: str or None
          description: The label for the x-axis. If None (default), Streamlit uses the column name from x if available.
          default: None
          kwarg_only: true
        y_label:
          type: str or None
          description: The label for the y-axis. If None (default), Streamlit uses the column name(s) from y if available.
          default: None
          kwarg_only: true
        color:
          type: str, tuple, Sequence of str, Sequence of tuple, or None
          description: >-
            The color to use for different series in this chart.
            For an area chart with just 1 series, this can be:
            None, to use the default color.
            A hex string like "#ffaa00" or "#ffaa0088".
            An RGB or RGBA tuple with the red, green, blue, and alpha
            components specified as ints from 0 to 255 or floats from 0.0 to
            1.0.
            A built-in color name: "red", "orange", "yellow", "green",
            "blue", "violet", "gray"/"grey", or "primary". These map to
            theme colors that you can customize using theme.<color>Color
            configuration options.
            For an area chart with multiple series, where the dataframe is in
            long format (that is, y is None or just one column), this can be:
            None, to use the default colors.
            The name of a column in the dataset. Data points will be grouped
            into series of the same color based on the value of this column.
            In addition, if the values in this column match one of the color
            formats above (hex string or color tuple), then that color will
            be used.
            For example: if the dataset has 1000 rows, but this column only
            contains the values "adult", "child", and "baby", then those 1000
            datapoints will be grouped into three series whose colors will be
            automatically selected from the default palette.
            But, if for the same 1000-row dataset, this column contained
            the values "#ffaa00", "#f0f", "#0000ff", then then those 1000
            datapoints would still be grouped into 3 series, but their
            colors would be "#ffaa00", "#f0f", "#0000ff" this time around.
            For an area chart with multiple series, where the dataframe is in
            wide format (that is, y is a Sequence of columns), this can be:
            None, to use the default colors.
            A list of string colors or color tuples to be used for each of
            the series in the chart. This list should have the same length
            as the number of y values (e.g. color=["#fd0", "#f0f", "#04f"]
            for three lines). You can also use built-in color names in the
            list (e.g. color=["red", "blue", "green"]).
            You can set the default colors in the theme.chartCategoryColors
            configuration option.
          default: None
          kwarg_only: true
        stack:
          type: bool, "normalize", "center", or None
          description: >-
            Whether to stack the areas. If this is None (default),
            Streamlit uses Vega's default. Other values can be as follows:
            True: The areas form a non-overlapping, additive stack within
            the chart.
            False: The areas overlap each other without stacking.
            "normalize": The areas are stacked and the total height is
            normalized to 100% of the height of the chart.
            "center": The areas are stacked and shifted to center their
            baseline, which creates a steamgraph.
          default: None
          kwarg_only: true
        width:
          type: '"stretch", "content", or int'
          description: '"stretch" (default): matches parent container width. "content": matches content width, capped at parent. Integer: fixed width in pixels, capped at parent.'
          default: '"stretch"'
          kwarg_only: true
        height:
          type: '"stretch", "content", or int'
          description: '"content" (default): matches content height. "stretch": matches content or parent container height, whichever is larger. Integer: fixed height in pixels with scrolling if content exceeds.'
          default: '"content"'
          kwarg_only: true
        use_container_width:
          type: bool or None
          description: 'Override chart native width with parent container width. None (default): chart default behavior. True: match parent. False: fit contents up to parent width.'
          default: None
          kwarg_only: true
