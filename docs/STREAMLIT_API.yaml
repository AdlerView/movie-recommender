  component_v2:
    '@streamlit/component-v2-lib/FrontendRenderer':
      signature: 'FrontendRenderer&lt;TState extends FrontendState = FrontendState, TData = unknown&gt; = (componentArgs:
        FrontendRendererArgs&lt;TState, TData&gt;) =&gt; CleanupFunction | void'
      description: >-
        The Streamlit v2 component signature.
        import { FrontendRenderer } from '@streamlit/component-v2-lib';This type represents the function signature for the default export from your component's JavaScript or TypeScript code. This function gets called by Streamlit when your component is mounted in the frontend, and it receives all the necessary arguments to build and manage your component's UI and state.
      source: frontend/component-v2-lib/src/types.ts#L227
      parameters:
        FrontendRendererArgs:
          type: FrontendRendererArgs&lt;TState, TData&gt;
          description: The inputs and utilities provided by Streamlit to your component.
      returns:
      - type: CleanupFunction | void
        description: An optional cleanup function that Streamlit will call when the component is unmounted.
    '@streamlit/component-v2-lib/FrontendState':
      signature: FrontendState = Record&lt;string, unknown&gt;
      description: >-
        The base interface for defining a Streamlit custom component's state shape.
        import { FrontendState } from '@streamlit/component-v2-lib';Frontend state is a persistent key-value store of state and trigger values. You can extend this type or define your own interface to add type-safe state and trigger key-value pairs. Each key corresponds to an on_<key>_change callback parameter in Python.
      source: frontend/component-v2-lib/src/types.ts#L40
    '@streamlit/component-v2-lib/FrontendRendererArgs':
      signature: FrontendRendererArgs&lt;TState extends FrontendState = FrontendState, TData = unknown,&gt;
      description: >-
        The arguments passed to a Streamlit custom component's top-level export default function.
        import { FrontendRendererArgs } from '@streamlit/component-v2-lib';This type provides the interface between your TypeScript component and Streamlit's runtime, including the data payload from Python, utilities for managing component state, and the DOM container for mounting your UI.Component authors typically destructure these arguments for easier access.
      source: frontend/component-v2-lib/src/types.ts#L114
      parameters:
        data:
          type: TData
          description: The data payload sent from Python through the component's mounting command. This is the primary input
            for your component, typed by the component author via the TData generic.
        key:
          type: string
          description: >-
            A stable identifier for this component instance generated by Streamlit. This key is independent from the key parameter passed to the component's mounting command in Python. This frontend key is automatically generated to be unique among all instances of all components and to avoid collisions with classes and IDs in the app's DOM.
            Important
            If a component is mounted without a key parameter in Python, and one of the parameters in the mounting command changes, then this frontend key may change between app runs.
        name:
          type: string
          description: The component's name, as registered by Streamlit on the Python side. This is the same as the name parameter
            passed to st.components.v2.component.
        parentElement:
          type: HTMLElement or ShadowRoot
          description: The host element for your component. Your HTML, JavaScript, and CSS are mounted inside this container.
            This is a ShadowRoot if isolate_styles is set to true in the component definition, otherwise it's an HTMLElement.Avoid
            directly setting the inner HTML of this element, as it may overwrite the HTML, CSS, and JavaScript from the component
            definition. Instead, update its children or append new elements to it.
    '@streamlit/component-v2-lib/FrontendRendererArgs.setStateValue':
      signature: setStateValue(name, value)
      description: Set a state value by key. This state persists across app reruns. State values are accessible in Python
        through the component's result. Use this for values that should maintain their state when the user interacts with
        other parts of the Streamlit app.
      source: frontend/component-v2-lib/src/types.ts#L171
      parameters:
        name:
          type: string
          description: The state key to set. If you are using TypeScript, this should be a key from TState.To assign a value
            to a state key, in the component's mounting command in Python, an on_<key>_change callback isn't required. However,
            the presence of a callback will ensure that the state key is always present in the result.
        value:
          type: Any
          description: The value to associate with the key. Type must match the corresponding property type in your TState
            interface.
      returns:
      - type: None
    '@streamlit/component-v2-lib/FrontendRendererArgs.setTriggerValue':
      signature: setTriggerValue(name, value)
      description: Set a trigger value by key. This trigger persists for a only single app rerun.Trigger values are one-time
        events that are consumed during the resulting rerun and reset to null afterward. They're accessible in Python through
        the component's result. Use this for actions like button clicks, form submissions, or other event-based interactions.
      source: frontend/component-v2-lib/src/types.ts#L193
      parameters:
        name:
          type: string
          description: The trigger key to set. If you are using TypeScript, this should be a key from TState.To assign a value
            to a trigger key, in the component's mounting command in Python, an on_<key>_change callback isn't required. However,
            the presence of a callback will ensure that the trigger key is always present in the result.
        value:
          type: Any
          description: The value for this trigger. If you are using TypeScript, this should match the corresponding property
            type in your TState interface.
      returns:
      - type: None
    '@streamlit/component-v2-lib/ArrowData':
      signature: ArrowData = Uint8Array&lt;ArrayBufferLike&gt; | null
      description: >-
        Type for Arrow-serialized data from Python.
        import { ArrowData } from '@streamlit/component-v2-lib';Use this when defining interfaces for data that will be serialized using Apache Arrow.
      source: frontend/component-v2-lib/src/types.ts#L50
    '@streamlit/component-v2-lib/CleanupFunction':
      signature: CleanupFunction = () => void
      description: The cleanup function returned by a Streamlit v2 component.This type represents the cleanup function that
        your component can return from its top-level export default function. If provided, Streamlit will call this function
        when your component is unmounted from the app, allowing you to perform any necessary cleanup tasks, such as removing
        event listeners or canceling network requests.
      source: frontend/component-v2-lib/src/types.ts#L205
config_toml:
  description: Complete Streamlit configuration reference. Set in .streamlit/config.toml (per-project) or ~/.streamlit/config.toml
    (global). Per-project takes precedence. Env vars and CLI flags override both.
  global:
    disableWidgetStateDuplicationWarning:
      default: false
      description: Suppress warning when both widget default value and st.session_state value are set for the same key.
    showWarningOnDirectExecution:
      default: true
      description: Show warning when running Streamlit script via python my_script.py.
  logger:
    level:
      default: info
      options:
      - error
      - warning
      - info
      - debug
      description: Logging level.
    messageFormat:
      default: '%(asctime)s %(message)s'
      description: Python logging format string.
  client:
    showErrorDetails:
      default: full
      options:
      - full
      - stacktrace
      - type
      - none
      description: Controls exception display in browser.
    toolbarMode:
      default: auto
      options:
      - auto
      - developer
      - viewer
      - minimal
      description: Toolbar/menu visibility.
    showSidebarNavigation:
      default: true
      description: Show default sidebar page navigation in multi-page apps (only for pages/ directory).
    showErrorLinks:
      default: auto
      description: Show external help links in error displays. "auto"=localhost only.
  runner:
    magicEnabled:
      default: true
      description: Allow writing a variable/string by itself on a single line to auto-write it to the app.
    fastReruns:
      default: true
      description: Handle rerun requests immediately rather than waiting for yield points.
    enforceSerializableSessionState:
      default: false
      description: Raise exception for unserializable data in Session State.
    enumCoercion:
      default: nameOnly
      options:
      - 'off'
      - nameOnly
      - nameAndValue
      description: How option widgets coerce Enum members.
  server:
    fileWatcherType:
      default: auto
      options:
      - auto
      - watchdog
      - poll
      - none
      description: File watcher type.
    headless:
      default: false
      description: If false, attempt to open browser on start.
    runOnSave:
      default: false
      description: Auto-rerun script on file modification.
    port:
      default: 8501
      description: Port for browser connections.
    address:
      default: unset
      description: Specific address for server to listen on.
    baseUrlPath:
      default: ''
      description: Base path for URL.
    enableCORS:
      default: true
      description: Enable Cross-Origin Resource Sharing protection.
    enableXsrfProtection:
      default: true
      description: Enable Cross-Site Request Forgery protection.
    maxUploadSize:
      default: 200
      description: Max file upload size in MB.
    maxMessageSize:
      default: 200
      description: Max WebSocket message size in MB.
    enableWebsocketCompression:
      default: false
      description: Enable websocket compression.
    enableStaticServing:
      default: false
      description: Serve files from a static/ directory in the app root.
    disconnectedSessionTTL:
      default: 120
      description: TTL in seconds for sessions with disconnected websockets.
    sslCertFile:
      default: unset
      description: SSL certificate file for HTTPS. NOT for production.
    sslKeyFile:
      default: unset
      description: SSL key file for HTTPS. NOT for production.
  browser:
    serverAddress:
      default: localhost
      description: Address users point browsers to.
    gatherUsageStats:
      default: true
      description: Send usage statistics to Streamlit.
    serverPort:
      default: matches server.port
      description: Port users point browsers to.
  theme:
    _note: Supports [theme.light], [theme.dark], [theme.sidebar], [theme.light.sidebar], [theme.dark.sidebar]. Options below
      apply at all levels unless noted as global-only.
    global_only_options:
      base: 'Inherited theme: "light", "dark", path to TOML, or URL to TOML theme file.'
      fontFaces: Array of font definitions with family, url, optional weight, style, unicodeRange.
      baseFontSize: 'Root font size in pixels (default: 16).'
      baseFontWeight: 'Root font weight 100-600 (default: 400).'
      showSidebarBorder: Show vertical separator between sidebar and main content.
      chartCategoricalColors: Array of colors for categorical chart data.
      chartSequentialColors: Exactly 10 colors for sequential/continuous gradient.
      chartDivergingColors: Exactly 10 colors for diverging data.
    colors:
      primaryColor: Primary accent color for interactive elements.
      backgroundColor: App background color.
      secondaryBackgroundColor: Widget background color.
      textColor: Text color.
      palette_colors: redColor, orangeColor, yellowColor, blueColor, greenColor, violetColor, grayColor — each configurable
        with hex values.
      palette_backgrounds: redBackgroundColor, orangeBackgroundColor, etc. — derived from palette colors at 10%/20% opacity
        if not set.
      palette_text: redTextColor, orangeTextColor, etc. — derived from palette colors, darkened/lightened 15%.
      linkColor: Defaults to blueTextColor.
      linkUnderline: Whether links show underlines.
      codeTextColor: Defaults to greenTextColor.
      codeBackgroundColor: Background for code blocks.
    typography:
      font: '"sans-serif", "serif", "monospace", custom fontFaces name, CSS URL "FontName:url", or comma-separated fallbacks.'
      headingFont: Heading font family (defaults to theme.font).
      headingFontSizes: 'Array of h1-h6 sizes. Defaults: ["2.75rem", "2.25rem", "1.75rem", "1.5rem", "1.25rem", "1rem"].'
      headingFontWeights: 'Array of h1-h6 weights. Defaults: [700, 600, 600, 600, 600, 600].'
      codeFont: Code/monospace font family.
      codeFontSize: 'Code font size (default: 0.875rem).'
      codeFontWeight: 'Code font weight 100-600 (default: 400).'
    layout_borders:
      baseRadius: '"none", "small", "medium", "large", "full", or pixel/rem value.'
      buttonRadius: Corner radius for buttons (defaults to baseRadius).
      borderColor: Border color around elements.
      showWidgetBorder: Show border around input widgets.
      dataframeBorderColor: Dataframe/table border color.
      dataframeHeaderBackgroundColor: Dataframe header background.
  secrets:
    files:
      default:
      - ~/.streamlit/secrets.toml
      - <project>/.streamlit/secrets.toml
      description: List of secrets file locations (TOML or Kubernetes-style). Later files take precedence.
concepts:
  session_state:
    topic: Sharing variables between reruns for each user session
    key_points:
    - Each browser tab is a unique session. Scripts rerun top-to-bottom on every interaction with a blank slate.
    - st.session_state is a dict-like object (supports st.session_state["key"] and st.session_state.key) that persists across
      reruns and pages.
    - 'Initialize with: if "key" not in st.session_state: st.session_state.key = value'
    - 'Widgets with a key parameter auto-sync to session_state: st.text_input("Name", key="name") -> st.session_state.name'
    - Setting st.session_state.celsius BEFORE a slider with key="celsius" sets its initial value.
    - Callbacks (on_change/on_click) with args and kwargs run as a PREFIX to the script rerun.
    - st.form_submit_button supports on_click callbacks with session state for batch processing.
    - 'Delete with: del st.session_state[key]. Clear all via Settings > Clear Cache + Rerun.'
    gotchas:
    - Session state is tied to WebSocket. Reloading browser tab or navigating via Markdown link resets it.
    - CANNOT set widget values via session state for st.button and st.file_uploader (raises StreamlitAPIException).
    - Cannot modify a widget value via session_state after the widget is instantiated in the current run.
    - Setting both a widget default AND session_state value for the same key triggers a warning on first run.
    - Only st.form_submit_button supports callbacks inside forms.
    - Accessing an uninitialized session state variable throws an exception.
    config:
      runner.enforceSerializableSessionState: When true, only pickle-serializable objects allowed in session state.
  widget_behavior:
    topic: How widgets manage identity, state, lifecycle, and query parameter binding
    key_points:
    - Widget values are session-scoped; one user's actions never affect another user.
    - Widgets return simple Python types and their default value on first call before interaction.
    - 'Widget identity (v1.55.0+): With a key, the key is primary identity — changing label/options/default does NOT reset.'
    - Without a key, changing label/min/max/default/placeholder/help resets the widget.
    - 'Order of operations on interaction: (1) session_state updated, (2) callback executed, (3) page reruns with new value.'
    - Widget state is NOT preserved between pages. Widgets not rendered in a run are deleted from session_state.
    - 'Placeholder key pattern for cross-page state: widget uses _my_key, callback copies to my_key, restore before widget
      call.'
    - bind="query-params" (v1.55.0+) syncs widget value with URL query parameters. Default values omitted from URL.
    - DuplicateWidgetID error if two identical widgets exist on same page without unique keys.
    gotchas:
    - Callback args/kwargs are evaluated when widget command runs, not when user interacts. Use st.session_state inside callback.
    - Deleting a key from session state does NOT revert the widget to its default.
    - Trigger widgets (st.button, st.download_button, st.chat_input, st.file_uploader, st.camera_input, st.audio_input) don't
      support bind.
    - Some params still affect identity with a key (e.g. min_value/max_value for st.slider).
    - Navigating between pages by URL creates new session and resets session_state.
  caching:
    topic: Caching function results to avoid recomputation
    key_points:
    - '@st.cache_data: For serializable return values (DataFrames, strings, arrays). Creates a COPY via pickle. Safe for mutations.
      Use for DB queries, API calls, transforms.'
    - '@st.cache_resource: For non-serializable singletons (DB connections, ML models). Returns SAME object. Shared across
      ALL users. Must be thread-safe.'
    - Cache key = hash(input parameters) + hash(function code).
    - 'ttl: Time-to-live (seconds, timedelta, or string like "1d"). Essential for data freshness.'
    - 'max_entries: Caps cache size; oldest entry evicted when full.'
    - 'show_spinner: True (default), False, or custom string.'
    - 'Unhashable params: Prefix with underscore (_param) to exclude from hashing.'
    - 'hash_funcs: Dict mapping types to custom hash functions. Avoid id() as hash func.'
    - Cached functions can contain st.* commands — they are replayed on cache hits.
    - scope="global" (default) or "session" for per-session caching.
    - 'Clear: func.clear() for individual, st.cache_data.clear() / st.cache_resource.clear() for all.'
    gotchas:
    - cache_resource mutations affect ALL users (shared singleton). Dropping a DataFrame column corrupts cache for everyone.
    - cache_data becomes slow for DataFrames >100M rows due to serialization overhead.
    - Caching async functions is NOT supported.
    - TTL is ignored when persist="disk".
    - TTL expiration only happens when expired resources are accessed, not proactively.
    - Session-scoped cache clears on disconnect — unstable networks cause multiple populates.
  forms:
    topic: Batching user input to prevent reruns until submission
    key_points:
    - st.form batches widget interactions — script only reruns when submitted.
    - Every form MUST contain exactly one st.form_submit_button.
    - Unsubmitted changes are discarded on any other rerun.
    - Submit via Enter in text_input/number_input; Ctrl+Enter / Cmd+Enter in text_area.
    - 'Three processing patterns: (1) condition on submit button, (2) callback with session state, (3) st.rerun().'
    - Only st.form_submit_button can have a callback inside a form.
    gotchas:
    - st.button and st.download_button CANNOT be added to a form.
    - Forms CANNOT be nested inside other forms.
    - Interdependent widgets inside a form don't update each other until submission.
    - Do NOT pass widget values via callback args/kwargs; use st.session_state with widget keys inside callback body.
  fragments:
    topic: Partial reruns with @st.fragment — rerun only a portion of code
    key_points:
    - '@st.fragment decorator turns a function into a fragment.'
    - Widget interactions inside a fragment trigger only a FRAGMENT RERUN (not full script rerun).
    - Elements in main body of fragment are cleared and redrawn. Elements in external containers accumulate (use st.empty).
    - Widgets can only be placed in fragment's main body, not in externally created containers.
    - run_every parameter enables automatic periodic reruns (e.g. run_every="10s" for live data).
    - Call st.rerun() inside fragment for full-script rerun.
    - Fragment return values are ignored during fragment reruns; use session state to share data.
    - 'Fragments vs Forms: Forms batch input; fragments immediately process but limit rerun scope.'
    - 'Fragments vs Callbacks: Callbacks are a single prefix to a full rerun; fragments are repeatable partial reruns.'
    gotchas:
    - Using caching and fragments on the same function is unsupported.
    - Fragments can't detect changes in input values; use session state for dynamic I/O.
    - Widgets cannot be rendered in containers created outside the fragment.
  layouts_and_containers:
    topic: Arranging and organizing elements in the app
    key_points:
    - 'Two ways to write into containers: "with" context manager or method calls on the container object.'
    - 'st.sidebar: Persistent left panel. Use st.sidebar.widget() or "with st.sidebar:".'
    - 'st.container(): Invisible grouping. border=True adds visible border. height=N (px) creates scrollable region.'
    - 'st.columns(N) or st.columns([2,1]): Fixed-width side-by-side layout. Stacks on narrow screens.'
    - 'st.container(horizontal=True): Flex horizontal layout. Elements size by content, wrap on overflow. Preferred over columns.'
    - 'st.tabs(["Tab1", "Tab2"]): Labeled views, one visible at a time. ALL tab content runs every rerun by default.'
    - 'st.expander("Title"): Collapsible content. expanded=True to start open.'
    - 'st.popover("Click me"): Floating overlay triggered by button.'
    - 'st.empty(): Single-element placeholder. Each write replaces previous. Nest st.container inside for multi-element replacement.'
    - 'gap parameter: "xxsmall" (0.25rem) through "xxlarge" (8rem). st.space("large") for manual spacing.'
    - horizontal_alignment and vertical_alignment params on containers/columns.
    - 'Dynamic containers (v1.55.0+): on_change="rerun" on tabs/expander/popover enables state tracking via .open attribute.'
    nesting_rules:
    - 'Columns in columns: NOT recommended (max 1 level).'
    - 'Chat messages in chat messages: NOT recommended.'
    - 'Tabs in tabs: Allowed but use sparingly.'
    - 'Any container in sidebar: Allowed.'
    - Columns divide fixed proportions — can waste space with variable-width content.
  multipage_apps:
    topic: Building apps with multiple pages
    key_points:
    - 'Two mechanisms: (1) pages/ directory (simple, auto-nav), (2) st.Page + st.navigation (preferred, flexible).'
    - st.navigation must be called exactly once per run, only in entrypoint file. Returns selected page; call .run() to execute.
    - st.Page(path_or_callable, title=, icon=, default=, url_path=, visibility=) configures each page.
    - 'Entrypoint file is the shared frame: elements/widgets there persist across all pages.'
    - 'Pass dict for section headers: {"Section": [page1, page2]}.'
    - 'position parameter: "sidebar" (default), or "hidden" for custom nav menus.'
    - 'Dynamic pages: Change list based on session state for role-based access. Pages not in st.navigation are inaccessible.'
    - st.switch_page(page) for programmatic navigation.
    - st.set_page_config can be called multiple times — in entrypoint for defaults, in page to override.
    gotchas:
    - Only the page returned by st.navigation can call .run().
    - A page not included in st.navigation is completely inaccessible (no URL, no st.switch_page).
    - Navigating between pages by URL creates new session and resets session_state. Use Streamlit nav commands to preserve
      state.
    - Widget state is NOT preserved between pages.
  authentication:
    topic: User authentication via OpenID Connect (OIDC)
    key_points:
    - OIDC provides authentication (who you are), NOT authorization (acting on behalf).
    - st.login() redirects to identity provider. After login, stores identity cookie and starts new session at homepage.
    - 'st.user: dict-like with .is_logged_in, .name, etc. Updated at session start only.'
    - st.logout() removes identity cookie and starts new session. Only logs out current session.
    - Identity cookie expires after 30 days (NOT configurable).
    - 'Multiple providers: [auth.google], [auth.microsoft] in secrets.toml. Pass name to st.login("google").'
    - 'Default OIDC params: scope="openid profile email", prompt="select_account". Override via client_kwargs.'
    - 'Common pattern: if not st.user.is_logged_in: st.login(); st.stop()'
    config_secrets_toml:
      '[auth]': redirect_uri, cookie_secret (shared across providers)
      '[auth.provider_name]': client_id, client_secret, server_metadata_url
    gotchas:
    - st.login() and st.logout() both start new sessions.
    - Logging out does NOT log user out of the identity provider (e.g. Google).
    - For stricter session control, check token expiration in st.user and call st.logout() manually.
  theming:
    topic: Customizing app appearance via config.toml [theme] section
    key_points:
    - 'Supports switchable light/dark: [theme.light], [theme.dark]. Sidebar separately: [theme.sidebar], [theme.light.sidebar],
      [theme.dark.sidebar].'
    - 'theme.base: "light", "dark", path to TOML, or URL to TOML theme file.'
    - 'primaryColor: Accent for interactive elements. Must contrast with white text.'
    - 'backgroundColor / secondaryBackgroundColor: Main and widget backgrounds. Sidebar swaps these if not set.'
    - 'Font options: "sans-serif", "serif", "monospace", custom fontFaces, or "FontName:url" format.'
    - 'fontFaces: [[theme.fontFaces]] TOML array with family, url, weight, style. Requires server.enableStaticServing=true
      for local fonts.'
    - baseFontSize (default 16px), baseFontWeight (default 400) — global only, not sidebar-configurable.
    - 'headingFontSizes: Array of 6 sizes for h1-h6. Fewer than 6 fills remaining with defaults.'
    - 'baseRadius: "none", "small", "medium", "large", "full", or px/rem. buttonRadius overrides for buttons.'
    - 'Color palette: 7 colors (red, orange, yellow, green, blue, violet, gray) each with auto-derived Background and Text
      variants.'
    - chartCategoricalColors / chartSequentialColors (10 colors) / chartDivergingColors (10 colors).
    - Most theme options update live. fontFaces changes require server restart.
    gotchas:
    - Sidebar inherits swapped background colors if not explicitly configured.
    - Interactive charts always have square corners. st.chat_input/st.audio_input always fully rounded.
    - Inline code font size is fixed at 0.75em, not affected by codeFontSize.
    - External fonts may transmit user IP to third-party servers.
