    streamlit.date_input:
      signature: st.date_input(label, value="today", min_value=None, max_value=None, key=None, help=None, on_change=None,
        args=None, kwargs=None, *, format="YYYY/MM/DD", disabled=False, label_visibility="visible", width="stretch", bind=None)
      description: >-
        Display a date input widget.
        The date input widget can be configured to accept a single date or a
        date range. The first day of the week is determined from the user's
        locale in their browser.
      source: lib/streamlit/elements/widgets/time_widgets.py#L1482
      parameters:
        label:
          type: str
          description: >-
            A short label explaining to the user what this date input is for.
            The label can optionally contain GitHub-flavored Markdown of the
            following types: Bold, Italics, Strikethroughs, Inline Code, Links,
            and Images. Images display like icons, with a max height equal to
            the font height.
            Unsupported Markdown elements are unwrapped so only their children
            (text contents) render. Common block-level Markdown (headings,
            lists, blockquotes) is automatically escaped and displays as
            literal text in labels.
            See the body parameter of st.markdown for additional,
            supported Markdown directives.
            For accessibility reasons, you should never set an empty label, but
            you can hide it with label_visibility if needed. In the future,
            we may disallow empty labels by raising an exception.
        value:
          type: '"today", datetime.date, datetime.datetime, str, list/tuple of these, or None'
          description: >-
            The value of this widget when it first renders. This can be one of
            the following:
            "today" (default): The widget initializes with the current date.
            A datetime.date or datetime.datetime object: The widget
            initializes with the given date, ignoring any time if included.
            An ISO-formatted date (YYYY-MM-DD) or datetime
            (YYYY-MM-DD hh:mm:ss) string: The widget initializes with the
            given date, ignoring any time if included.
            A list or tuple with up to two of the above: The widget will
            initialize with the given date interval and return a tuple of the
            selected interval. You can pass an empty list to initialize the
            widget with an empty interval or a list with one value to
            initialize only the beginning date of the iterval.
            None: The widget initializes with no date and returns
            None until the user selects a date.
          default: '"today"'
        min_value:
          type: '"today", datetime.date, datetime.datetime, str, or None'
          description: >-
            The minimum selectable date. This can be any of the date types
            accepted by value, except list or tuple.
            If this is None (default), the minimum selectable date is ten
            years before the initial value. If the initial value is an
            interval, the minimum selectable date is ten years before the start
            date of the interval. If no initial value is set, the minimum
            selectable date is ten years before today.
          default: None
        max_value:
          type: '"today", datetime.date, datetime.datetime, str, or None'
          description: >-
            The maximum selectable date. This can be any of the date types
            accepted by value, except list or tuple.
            If this is None (default), the maximum selectable date is ten
            years after the initial value. If the initial value is an interval,
            the maximum selectable date is ten years after the end date of the
            interval. If no initial value is set, the maximum selectable date
            is ten years after today.
          default: None
        key:
          type: str, int, or None
          description: Unique key for the widget. Stabilizes identity across reruns. Note: changing format resets widget even with a key. Read/update via st.session_state[key]. Also CSS class st-key-.
          default: None
        help:
          type: str or None
          description: A tooltip displayed next to the widget label (only when label_visibility="visible"). If None (default), no tooltip. Supports GitHub-flavored Markdown.
          default: None
        on_change:
          type: callable
          description: An optional callback invoked when this date_input's value changes.
          default: None
        args:
          type: list or tuple
          description: An optional list or tuple of args to pass to the callback.
          default: None
        kwargs:
          type: dict
          description: An optional dict of kwargs to pass to the callback.
          default: None
        format:
          type: str
          description: 'Date display format. Supports "YYYY/MM/DD" (default), "DD/MM/YYYY", or "MM/DD/YYYY". Period (.) and hyphen (-) also work as separators.'
          default: '"YYYY/MM/DD"'
          kwarg_only: true
        disabled:
          type: bool
          description: Disables the date input if set to True. Default is False.
          default: 'False'
          kwarg_only: true
        label_visibility:
          type: '"visible", "hidden", or "collapsed"'
          description: 'The visibility of the label. Default is "visible". "hidden": empty spacer instead of label. "collapsed": no label or spacer.'
          default: '"visible"'
          kwarg_only: true
        width:
          type: '"stretch" or int'
          description: '"stretch" (default): matches parent width. Integer: fixed width in pixels, capped at parent.'
          default: '"stretch"'
          kwarg_only: true
        bind:
          type: '"query-params" or None'
          description: 'Syncs widget value with URL query parameter. None (default): not synced. "query-params": changes update URL, widget can be initialized from URL. Requires key (used as query param name). Default values are removed from URL. Bound params can only be changed via st.session_state.'
            Dates use ISO 8601 format (YYYY-MM-DD) in the URL. Invalid
            query parameter values are ignored and removed from the URL.
            If value is None, an empty query parameter (e.g.,
            ?vacation=) clears the widget. Date ranges use repeated
            parameters (e.g.,
            ?vacation=2025-01-01&vacation=2025-01-31).
          default: None
          kwarg_only: true
      returns:
      - type: datetime.date or a tuple with 0-2 dates or None
        description: The current value of the date input widget or None if no date has been selected.
