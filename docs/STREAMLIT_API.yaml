            display numbers. The output must be purely numeric. This does not
            impact the return value of the widget. For more information about
            the formatting specification, see sprintf.js.
            For example, format="%0.1f" adjusts the displayed decimal
            precision to only show one digit after the decimal. Use , for
            thousand separators (e.g. "%,d" yields "1,234").
          default: None
        key:
          type: str, int, or None
          description: An optional string or integer to use as the unique key for the widget. If None (default), a key is generated based on other parameters. Assigning a key stabilizes identity and preserves state across reruns. Read or update value via st.session_state[key]. Also used as CSS class name prefixed with st-key-.
          default: None
        help:
          type: str or None
          description: A tooltip displayed next to the widget label (only when label_visibility="visible"). If None (default), no tooltip. Supports GitHub-flavored Markdown.
          default: None
        on_change:
          type: callable
          description: An optional callback invoked when this number_input's value changes.
          default: None
        args:
          type: list or tuple
          description: An optional list or tuple of args to pass to the callback.
          default: None
        kwargs:
          type: dict
          description: An optional dict of kwargs to pass to the callback.
          default: None
        placeholder:
          type: str or None
          description: An optional string displayed when the number input is empty. If None, no placeholder is displayed.
          default: None
          kwarg_only: true
        disabled:
          type: bool
          description: Disables the number input if set to True. Default is False.
          default: 'False'
          kwarg_only: true
        label_visibility:
          type: '"visible", "hidden", or "collapsed"'
          description: 'The visibility of the label. Default is "visible". "hidden": empty spacer instead of label. "collapsed": no label or spacer.'
          default: '"visible"'
          kwarg_only: true
        icon:
          type: str, None
          description: >-
            An optional emoji or icon to display within the input field to the left of the value. If icon is None (default), no icon is displayed. Options:
            - A single-character emoji (e.g. "🚨" or "🔥"). Emoji short codes are not supported.
            - A Material Symbols icon: ":material/icon_name:" (rounded style, snake case).
            - "spinner": Displays a spinner as an icon.
          default: None
          kwarg_only: true
        width:
          type: '"stretch" or int'
          description: '"stretch" (default): matches parent width. Integer: fixed width in pixels, capped at parent.'
          default: '"stretch"'
          kwarg_only: true
        bind:
          type: '"query-params" or None'
