[server]
headless = true
enableStaticServing = true

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false

# --- Poppins font faces (6 used weights) ---
# Light:     KPI metric values on Statistics (via CSS font-weight: 300)
# Regular:   Body text, captions, labels, buttons, inputs, table cells
# Italic:    Tagline in Discover detail dialog (*tagline* → <em>)
# Medium:    H2-H6 subheaders (headingFontWeights)
# SemiBold:  H1 headers, active nav tab (headingFontWeights[0])
# Bold:      Markdown **bold** in captions (person names, labels)

[[theme.fontFaces]]
family = "Poppins"
url = "static/Poppins-Light.ttf"
style = "normal"
weight = "300"

[[theme.fontFaces]]
family = "Poppins"
url = "static/Poppins-Regular.ttf"
style = "normal"
weight = "400"

[[theme.fontFaces]]
family = "Poppins"
url = "static/Poppins-Italic.ttf"
style = "italic"
weight = "400"

[[theme.fontFaces]]
family = "Poppins"
url = "static/Poppins-Medium.ttf"
style = "normal"
weight = "500"

[[theme.fontFaces]]
family = "Poppins"
url = "static/Poppins-SemiBold.ttf"
style = "normal"
weight = "600"

[[theme.fontFaces]]
family = "Poppins"
url = "static/Poppins-Bold.ttf"
style = "normal"
weight = "700"

# --- Cinema Gold theme (dark base, warm copper/gold accent) ---

[theme]
base = "dark"
primaryColor = "#D4A574"
backgroundColor = "#2a2a2a"
secondaryBackgroundColor = "#121212"
codeBackgroundColor = "#121212"
textColor = "#ffffff"
linkColor = "#D4A574"
borderColor = "#7c7c7c"
showWidgetBorder = true
baseRadius = "0.3rem"
buttonRadius = "full"
font = "Poppins"
headingFontWeights = [600, 500, 500, 500, 500, 500]
headingFontSizes = ["3rem", "2.5rem", "2.25rem", "2rem", "1.5rem", "1rem"]
chartCategoricalColors = ["#D4A574", "#8B6F4E", "#E8C49A", "#C4956A", "#A67B50", "#F0D4B0", "#6B5540", "#BFA080", "#D9B890", "#907060"]

[theme.sidebar]
backgroundColor = "#121212"
secondaryBackgroundColor = "#000000"
codeBackgroundColor = "#2a2a2a"
borderColor = "#696969"
